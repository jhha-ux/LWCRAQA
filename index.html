<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인허가 자료 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #171b26; --surface2: #1e2334;
    --border: #2a3050; --accent: #4f8ef7; --accent2: #7c5cbf;
    --green: #34c98a; --yellow: #f5c842; --red: #e05c5c;
    --text: #e8eaf2; --text-muted: #7a84a0; --text-dim: #4a5270;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; min-height:100vh; }

  /* TOPBAR */
  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .logo-text { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.08em; }
  .logo-sub { font-size:11px; color:var(--text-muted); letter-spacing:0.04em; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .date-chip { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); padding:4px 12px; border-radius:20px; }
  .add-btn { background:var(--accent); color:#fff; border:none; padding:7px 18px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; }
  .add-btn:hover { opacity:0.85; }
  .admin-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:7px 14px; border-radius:6px; font-size:12px; cursor:pointer; transition:all 0.2s; }
  .admin-btn.active { background:rgba(52,201,138,0.12); border-color:var(--green); color:var(--green); }
  .admin-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* MAIN */
  .main { max-width:1300px; margin:0 auto; padding:32px 24px; }

  /* STATS */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; overflow:hidden; }
  .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .stat-card.blue::before { background:var(--accent); }
  .stat-card.purple::before { background:var(--accent2); }
  .stat-card.green::before { background:var(--green); }
  .stat-card.yellow::before { background:var(--yellow); }
  .stat-label { font-size:11px; color:var(--text-muted); letter-spacing:0.06em; margin-bottom:10px; text-transform:uppercase; }
  .stat-value { font-family:'DM Mono',monospace; font-size:28px; font-weight:500; line-height:1; margin-bottom:6px; }
  .stat-card.blue .stat-value { color:var(--accent); }
  .stat-card.purple .stat-value { color:var(--accent2); }
  .stat-card.green .stat-value { color:var(--green); }
  .stat-card.yellow .stat-value { color:var(--yellow); }
  .stat-desc { font-size:11px; color:var(--text-dim); }

  /* FILTER */
  .section-title { font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  .section-title span { width:3px; height:14px; border-radius:2px; background:var(--accent); display:inline-block; }
  .filter-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:5px 14px; border-radius:20px; font-size:11px; cursor:pointer; transition:all 0.15s; }
  .filter-btn.active, .filter-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* SEARCH */
  .search-wrap { position:relative; margin-bottom:16px; }
  .search-input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 16px 10px 38px; border-radius:8px; font-size:13px; font-family:'Noto Sans KR',sans-serif; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-dim); }

  /* TABLE */
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:32px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:1000px; }
  thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
  thead th { text-align:left; padding:12px 16px; font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; white-space:nowrap; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }
  tbody td { padding:13px 16px; font-size:13px; vertical-align:middle; }
  .date-mono { font-family:'DM Mono',monospace; font-size:12px; color:var(--text-muted); }
  .country-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; background:rgba(79,142,247,0.12); color:var(--accent); border:1px solid rgba(79,142,247,0.25); }
  .type-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; white-space:nowrap; }
  .type-badge.domestic { background:rgba(52,201,138,0.12); color:var(--green); border:1px solid rgba(52,201,138,0.25); }
  .type-badge.foreign-quality { background:rgba(245,200,66,0.12); color:var(--yellow); border:1px solid rgba(245,200,66,0.25); }
  .type-badge.foreign-reg { background:rgba(124,92,191,0.12); color:var(--accent2); border:1px solid rgba(124,92,191,0.25); }
  .status-dot { display:inline-flex; align-items:center; gap:6px; font-size:12px; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot.green { background:var(--green); box-shadow:0 0 5px var(--green); }
  .dot.yellow { background:var(--yellow); }
  .dot.red { background:var(--red); }
  .drive-link { display:inline-flex; align-items:center; gap:5px; color:var(--accent); text-decoration:none; font-size:12px; padding:4px 10px; border-radius:5px; border:1px solid rgba(79,142,247,0.3); background:rgba(79,142,247,0.06); }
  .drive-link:hover { background:rgba(79,142,247,0.15); }
  .remarks-text { font-size:12px; color:var(--text-muted); max-width:160px; word-break:break-word; line-height:1.4; }
  .delete-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:18px; padding:0 4px; transition:color 0.15s; }
  .delete-btn:hover { color:var(--red); }
  .status-select { background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:4px 8px; border-radius:6px; font-size:12px; font-family:'Noto Sans KR',sans-serif; cursor:pointer; outline:none; }
  .link-input-wrap { display:flex; align-items:center; gap:6px; }
  .link-input { background:var(--surface2); border:1px solid var(--accent); color:var(--text); padding:5px 9px; border-radius:6px; font-size:12px; outline:none; width:180px; }
  .link-save-btn { background:var(--accent); border:none; color:#fff; padding:4px 10px; border-radius:5px; font-size:11px; cursor:pointer; }
  .link-cancel-btn { background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer; }
  .empty-row td { text-align:center; padding:48px !important; color:var(--text-dim); font-size:13px; }

  /* 체크박스 */
  .cb { width:15px; height:15px; cursor:pointer; accent-color:var(--accent); }
  .bulk-bar { display:none; align-items:center; gap:12px; background:rgba(224,92,92,0.1); border:1px solid rgba(224,92,92,0.3); border-radius:8px; padding:8px 16px; margin-bottom:12px; }
  .bulk-bar.show { display:flex; }
  .bulk-bar-text { font-size:13px; color:var(--red); }
  .bulk-delete-btn { background:var(--red); border:none; color:#fff; padding:6px 16px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; }
  .bulk-delete-btn:hover { opacity:0.85; }
  .bulk-cancel-btn { background:none; border:1px solid var(--border); color:var(--text-muted); padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; }

  /* LOADING */
  .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .loading-overlay.show { display:flex; }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:13px; color:var(--text-muted); }

  /* TOAST */
  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 22px; border-radius:24px; font-size:13px; opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:520px; max-width:95vw; animation:slideUp 0.2s ease; }
  @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; }
  .modal-close { background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  .form-label { font-size:11px; color:var(--text-muted); font-weight:500; text-transform:uppercase; letter-spacing:0.04em; }
  .form-input, .form-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:7px; font-size:13px; font-family:'Noto Sans KR',sans-serif; outline:none; }
  .form-input:focus, .form-select:focus { border-color:var(--accent); }
  .form-select option { background:var(--surface2); }
  .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:24px; }
  .btn-cancel { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:8px 20px; border-radius:7px; font-size:13px; cursor:pointer; }
  .btn-save { background:var(--accent); border:none; color:#fff; padding:8px 20px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; }
  .btn-save:hover { opacity:0.85; }

  /* PIN */
  .pin-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:32px; width:340px; max-width:95vw; text-align:center; animation:slideUp 0.2s ease; }
  .pin-title { font-size:15px; font-weight:700; margin-bottom:6px; }
  .pin-sub { font-size:12px; color:var(--text-muted); margin-bottom:24px; }
  .pin-dots { display:flex; justify-content:center; gap:12px; margin-bottom:24px; }
  .pin-dot-display { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all 0.15s; }
  .pin-dot-display.filled { background:var(--accent); border-color:var(--accent); }
  .pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .pin-key { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:14px; border-radius:10px; font-size:16px; font-family:'DM Mono',monospace; cursor:pointer; transition:all 0.1s; }
  .pin-key:hover { border-color:var(--accent); color:var(--accent); }
  .pin-key:active { transform:scale(0.95); }
  .pin-key.del { font-size:13px; color:var(--text-muted); }
  .pin-error { color:var(--red); font-size:12px; height:16px; margin-bottom:8px; }
  .pin-change-wrap { margin-top:12px; font-size:11px; color:var(--text-dim); }
  .pin-change-wrap a { color:var(--accent); cursor:pointer; text-decoration:underline; }

  @media (max-width:768px) {
    .stats-row { grid-template-columns:1fr 1fr; }
    .form-grid { grid-template-columns:1fr; }
    .topbar { padding:0 16px; }
    .main { padding:20px 16px; }
  }
</style>
</head>
<body>

<!-- ✅ 여기에 Apps Script URL 붙여넣기 -->
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby58EEmmI2tMs_FKtN4bfdJghrS0tVah2aDLTW52Nm0vDPxF9hUsz4TgpJiKWYi_whU/exec';
</script>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">불러오는 중...</div>
</div>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">LWC RA/QA Request Potal</div>
      <div class="logo-sub">품질관련 업무 요청</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="date-chip" id="todayDate"></div>
    <button class="admin-btn" id="adminToggleBtn">🔒 관리자 로그인</button>
    <button class="add-btn" onclick="openModal()">+ 새 요청 추가</button>
  </div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card blue"><div class="stat-label">전체 요청</div><div class="stat-value" id="stat-total">-</div><div class="stat-desc">누적 전체 요청</div></div>
    <div class="stat-card green"><div class="stat-label">국내 품질서류</div><div class="stat-value" id="stat-domestic">-</div><div class="stat-desc">국내 품질서류 요청</div></div>
    <div class="stat-card yellow"><div class="stat-label">해외 품질서류</div><div class="stat-value" id="stat-fq">-</div><div class="stat-desc">해외 품질서류 요청</div></div>
    <div class="stat-card purple"><div class="stat-label">해외 인허가</div><div class="stat-value" id="stat-fr">-</div><div class="stat-desc">해외 인허가 요청</div></div>
  </div>

  <div class="section-title"><span></span>요청 목록</div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center;">
    <span style="font-size:11px;color:var(--text-muted);">유형</span>
    <button class="filter-btn active" id="type-btn-all" onclick="filterType('all',this)">전체</button>
    <button class="filter-btn" onclick="filterType('국내 품질서류요청',this)">국내 품질서류</button>
    <button class="filter-btn" onclick="filterType('국내 문안검토요청',this)">국내 문안검토</button>
    <button class="filter-btn" onclick="filterType('해외 품질서류요청',this)">해외 품질서류</button>
    <button class="filter-btn" onclick="filterType('해외 인허가요청',this)">해외 인허가</button>
    <span style="width:1px;height:18px;background:var(--border);margin:0 4px;"></span>
    <span style="font-size:11px;color:var(--text-muted);">상태</span>
    <button class="filter-btn active" id="status-btn-all" onclick="filterStatus('all',this)">전체</button>
    <button class="filter-btn" onclick="filterStatus('신청',this)">신청</button>
    </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="제품명, 국가, 담당자, 비고 검색..." oninput="searchRows(this.value)">
  </div>

  <!-- 선택 삭제 바 (관리자 전용) -->
  <div class="bulk-bar" id="bulkBar">
    <span class="bulk-bar-text" id="bulkBarText">0개 선택됨</span>
    <button class="bulk-delete-btn" onclick="bulkDelete()">🗑 선택 삭제</button>
    <button class="bulk-cancel-btn" onclick="clearSelection()">취소</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th id="th-cb" style="display:none;width:40px;"><input type="checkbox" class="cb" id="checkAll" onchange="toggleCheckAll(this)"></th>
          <th>요청일자</th>
          <th>제품명</th>
          <th>국가</th>
          <th>유형</th>
          <th>담당자</th>
          <th>상태</th>
          <th>비고</th>
          <th>구글 드라이브(완료시)</th>
          <th id="th-del" style="display:none;"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row"><td colspan="9">📂 데이터를 불러오는 중입니다...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 새 요청 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title">
      <span>새 인허가 요청 등록</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">요청일자</label><input class="form-input" type="date" id="f-date"></div>
      <div class="form-group"><label class="form-label">국가</label><input class="form-input" type="text" id="f-country" placeholder="예: 인도네시아, 베트남"></div>
      <div class="form-group full"><label class="form-label">제품명</label><input class="form-input" type="text" id="f-product" placeholder="예: P.CALM PDRN Caffeine 11 Serum"></div>
      <div class="form-group">
        <label class="form-label">요청 유형</label>
        <select class="form-select" id="f-type">
          <option value="국내 품질서류요청">국내 품질서류요청</option>
          <option value="국내 문안검토요청">국내 문안검토요청</option>
          <option value="국내 CT요청">국내 CT요청</option>
          <option value="해외 품질서류요청">해외 품질서류요청</option>
          <option value="해외 인허가요청">해외 인허가요청</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">담당자</label><input class="form-input" type="text" id="f-manager" placeholder="예: 하재혁"></div>
      <div class="form-group">
        <label class="form-label">상태</label>
        <select class="form-select" id="f-status">
          <option value="신청">신청</option>
        </select>
      </div>
      <div class="form-group full"><label class="form-label">비고</label><input class="form-input" type="text" id="f-remarks" placeholder="내용을 입력해 주세요."></div>
      <div class="form-group full"><label class="form-label">구글 드라이브 링크</label><input class="form-input" type="url" id="f-link" placeholder="https://drive.google.com/..."></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveRow()">저장</button>
    </div>
  </div>
</div>

<!-- PIN 모달 -->
<div class="modal-overlay" id="pinOverlay" onclick="closePinOutside(event)">
  <div class="pin-modal">
    <div class="pin-title" id="pinModalTitle">🔐 관리자 PIN 입력</div>
    <div class="pin-sub" id="pinModalSub">4자리 PIN을 입력하세요</div>
    <div class="pin-dots">
      <div class="pin-dot-display" id="pd0"></div>
      <div class="pin-dot-display" id="pd1"></div>
      <div class="pin-dot-display" id="pd2"></div>
      <div class="pin-dot-display" id="pd3"></div>
    </div>
    <div class="pin-error" id="pinError"></div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key del" onclick="pinClear()">초기화</button>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDelete()">⌫</button>
    </div>
    <div class="pin-change-wrap" id="pinChangeWrap">
      처음 사용 시 PIN이 <b>1234</b>로 설정되어 있습니다.<br>
      로그인 후 <a onclick="openChangePin()">PIN 변경</a> 가능합니다.
    </div>
  </div>
</div>

<script>
  // =============================================
  // 상태
  // =============================================
  let data = [];
  let currentTypeFilter = 'all';
  let currentStatusFilter = 'all';
  let currentSearch = '';
  let isAdmin = false;
  let selectedRows = new Set(); // 체크박스 선택

  // PIN — localStorage 없이 메모리로만 (구글사이트/iframe 대응)
  const ADMIN_PIN = '1234'; // ← 원하는 PIN으로 변경
  let pinBuffer = '';
  let pinMode = 'login';
  let changePinTemp = '';
  let sessionPin = ADMIN_PIN; // 런타임 PIN (새로고침 시 초기화)

  // =============================================
  // 초기화
  // =============================================
  const today = new Date();
  document.getElementById('todayDate').textContent =
    today.toLocaleDateString('ko-KR', {year:'numeric', month:'2-digit', day:'2-digit'});
  const kstToday = new Date(today.getTime() + 9 * 60 * 60 * 1000);
document.getElementById('f-date').value = kstToday.toISOString().slice(0,10);

  // =============================================
  // API 통신
  // =============================================
  function showLoading(text='처리 중...') {
    document.getElementById('loadingText').textContent = text;
    document.getElementById('loadingOverlay').classList.add('show');
  }
  function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

  function showToast(msg, duration=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  async function api(params) {
    const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.json();
  }

  async function loadData() {
    showLoading('데이터 불러오는 중...');
    try {
      const result = await api({ action: 'getAll' });
      if (result.success) {
        data = result.data;
        render();
      } else {
        showToast('❌ 데이터 로딩 실패');
      }
    } catch(e) {
      showToast('❌ 서버 연결 실패. SCRIPT_URL을 확인하세요.');
      document.getElementById('tableBody').innerHTML =
        `<tr class="empty-row"><td colspan="9">⚠️ 서버 연결 실패.<br><small>SCRIPT_URL이 올바르게 설정되었는지 확인하세요.</small></td></tr>`;
    }
    hideLoading();
  }

  // =============================================
  // 관리자 UI
  // =============================================
  function updateAdminUI() {
    const btn = document.getElementById('adminToggleBtn');
    const thCb = document.getElementById('th-cb');
    const thDel = document.getElementById('th-del');
    if (isAdmin) {
      btn.textContent = '🔓 관리자 로그아웃';
      btn.classList.add('active');
      btn.onclick = adminLogout;
      thCb.style.display = '';
      thDel.style.display = '';
    } else {
      btn.textContent = '🔒 관리자 로그인';
      btn.classList.remove('active');
      btn.onclick = openPinModal;
      thCb.style.display = 'none';
      thDel.style.display = 'none';
      clearSelection();
    }
    render();
  }

  function adminLogout() {
    isAdmin = false;
    updateAdminUI();
    showToast('로그아웃 되었습니다.');
  }

  // =============================================
  // PIN (localStorage 없이 메모리 기반)
  // =============================================
  function openPinModal() {
    pinBuffer = ''; pinMode = 'login';
    document.getElementById('pinModalTitle').textContent = '🔐 관리자 PIN 입력';
    document.getElementById('pinModalSub').textContent = '4자리 PIN을 입력하세요';
    document.getElementById('pinChangeWrap').style.display = '';
    document.getElementById('pinError').textContent = '';
    updatePinDots();
    document.getElementById('pinOverlay').classList.add('show');
  }

  function openChangePin() {
    pinBuffer = ''; pinMode = 'change-old';
    document.getElementById('pinModalTitle').textContent = '🔑 PIN 변경';
    document.getElementById('pinModalSub').textContent = '현재 PIN을 입력하세요';
    document.getElementById('pinChangeWrap').style.display = 'none';
    document.getElementById('pinError').textContent = '';
    updatePinDots();
  }

  function closePinOutside(e) { if (e.target.id === 'pinOverlay') closePinModal(); }
  function closePinModal() { document.getElementById('pinOverlay').classList.remove('show'); pinBuffer = ''; }
  function updatePinDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById(`pd${i}`).classList.toggle('filled', i < pinBuffer.length);
  }
  function pinInput(n) {
    if (pinBuffer.length >= 4) return;
    pinBuffer += n;
    updatePinDots();
    document.getElementById('pinError').textContent = '';
    if (pinBuffer.length === 4) setTimeout(checkPin, 150);
  }
  function pinDelete() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
  function pinClear() { pinBuffer = ''; updatePinDots(); }

  function checkPin() {
    if (pinMode === 'login') {
      if (pinBuffer === sessionPin) {
        isAdmin = true; closePinModal(); updateAdminUI();
        showToast('✅ 관리자로 로그인되었습니다.');
      } else {
        document.getElementById('pinError').textContent = '❌ PIN이 올바르지 않습니다';
        pinBuffer = ''; updatePinDots();
      }
    } else if (pinMode === 'change-old') {
      if (pinBuffer === sessionPin) {
        pinBuffer = ''; pinMode = 'change-new';
        document.getElementById('pinModalSub').textContent = '새 PIN 4자리를 입력하세요';
        document.getElementById('pinError').textContent = '';
        updatePinDots();
      } else {
        document.getElementById('pinError').textContent = '❌ 현재 PIN이 올바르지 않습니다';
        pinBuffer = ''; updatePinDots();
      }
    } else if (pinMode === 'change-new') {
      changePinTemp = pinBuffer; pinBuffer = ''; pinMode = 'change-confirm';
      document.getElementById('pinModalSub').textContent = '새 PIN을 한 번 더 입력하세요';
      document.getElementById('pinError').textContent = '';
      updatePinDots();
    } else if (pinMode === 'change-confirm') {
      if (pinBuffer === changePinTemp) {
        sessionPin = pinBuffer;
        closePinModal();
        showToast('✅ PIN이 변경되었습니다. (재접속 시 초기화됩니다)');
      } else {
        document.getElementById('pinError').textContent = '❌ PIN이 일치하지 않습니다';
        pinBuffer = ''; pinMode = 'change-new';
        document.getElementById('pinModalSub').textContent = '새 PIN 4자리를 입력하세요';
        updatePinDots();
      }
    }
  }

  // =============================================
  // 체크박스
  // =============================================
  function toggleCheckAll(el) {
    const cbs = document.querySelectorAll('.row-cb');
    cbs.forEach(cb => {
      cb.checked = el.checked;
      const idx = parseInt(cb.dataset.idx);
      el.checked ? selectedRows.add(idx) : selectedRows.delete(idx);
    });
    updateBulkBar();
  }

  function toggleRowCheck(el, idx) {
    el.checked ? selectedRows.add(idx) : selectedRows.delete(idx);
    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const count = selectedRows.size;
    if (count > 0) {
      bar.classList.add('show');
      document.getElementById('bulkBarText').textContent = `${count}개 선택됨`;
    } else {
      bar.classList.remove('show');
    }
  }

  function clearSelection() {
    selectedRows.clear();
    document.querySelectorAll('.row-cb').forEach(cb => cb.checked = false);
    const ca = document.getElementById('checkAll');
    if (ca) ca.checked = false;
    updateBulkBar();
  }

  async function bulkDelete() {
    if (selectedRows.size === 0) return;
    if (!confirm(`선택한 ${selectedRows.size}개 항목을 삭제할까요?`)) return;
    showLoading('삭제 중...');
    // rowIndex 내림차순으로 삭제 (시트 행 번호 밀림 방지)
    const indices = [...selectedRows].map(i => data[i]._rowIndex).sort((a,b)=>b-a);
    try {
      for (const rowIndex of indices) {
        await api({ action: 'delete', rowIndex });
      }
      showToast(`✅ ${selectedRows.size}개 항목이 삭제되었습니다.`);
      selectedRows.clear();
      await loadData();
    } catch(e) {
      showToast('❌ 삭제 중 오류가 발생했습니다.');
    }
    hideLoading();
  }

  // =============================================
  // 렌더링
  // =============================================
  function typeBadgeClass(type) {
    if (type === '국내 품질서류요청') return 'domestic';
    if (type === '해외 품질서류요청') return 'foreign-quality';
    if (type === '해외 인허가요청') return 'foreign-reg';
    return 'foreign-reg';
  }

  function render() {
    const tbody = document.getElementById('tableBody');
    const filtered = data.filter(r => {
      const matchType   = currentTypeFilter === 'all' || r.type === currentTypeFilter;
      const matchStatus = currentStatusFilter === 'all' || r.status === currentStatusFilter;
      const q = currentSearch.toLowerCase();
      const matchSearch = !q ||
String(r.product||'').toLowerCase().includes(q) ||
String(r.country||'').toLowerCase().includes(q) ||
String(r.manager||'').toLowerCase().includes(q) ||
String(r.remarks||'').toLowerCase().includes(q);
      return matchType && matchStatus && matchSearch;
    });

    document.getElementById('stat-total').textContent    = data.length;
    document.getElementById('stat-domestic').textContent = data.filter(r=>r.type==='국내 품질서류요청').length;
    document.getElementById('stat-fq').textContent       = data.filter(r=>r.type==='해외 품질서류요청').length;
    document.getElementById('stat-fr').textContent       = data.filter(r=>r.type==='해외 인허가요청').length;

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="9">📂 해당하는 요청이 없습니다.</td></tr>`;
      return;
    }

    tbody.innerHTML = filtered.map((r, fi) => {
      const actualIdx  = data.indexOf(r);
      const dotClass   = r.status === '완료' ? 'green' : r.status === '진행중' ? 'yellow' : 'red';
      const badgeClass = typeBadgeClass(r.type);
      const isChecked  = selectedRows.has(actualIdx);

      const linkHtml = r.link
        ? `<a class="drive-link" href="${r.link}" target="_blank">📁 열기</a>`
        : `<span style="color:var(--text-dim);font-size:12px;${isAdmin?'cursor:pointer;':''}">
             ${isAdmin ? '+ 링크 추가' : '미첨부'}
           </span>`;

      const cbCell = isAdmin
        ? `<td style="text-align:center;">
             <input type="checkbox" class="cb row-cb" data-idx="${actualIdx}"
               ${isChecked?'checked':''} onchange="toggleRowCheck(this, ${actualIdx})">
           </td>`
        : '';

      const statusCell = isAdmin
        ? `<td class="status-cell" onclick="toggleStatusEdit(this, ${actualIdx})">
             <span class="status-dot"><span class="dot ${dotClass}"></span>${r.status}</span>
           </td>`
        : `<td><span class="status-dot"><span class="dot ${dotClass}"></span>${r.status}</span></td>`;

      const linkCell = isAdmin
        ? `<td class="link-cell" onclick="toggleLinkEdit(this, ${actualIdx})">${linkHtml}</td>`
        : `<td>${linkHtml}</td>`;

      const deleteCell = isAdmin
        ? `<td style="text-align:center;">
             <button class="delete-btn" onclick="deleteSingle(event, ${actualIdx})" title="삭제">×</button>
           </td>`
        : '';

      return `<tr>
        ${cbCell}
        <td><span class="date-mono">${String(r.date).slice(0,10)}</span></td>
        <td><b style="font-weight:500;">${r.product}</b></td>
        <td><span class="country-badge">${r.country}</span></td>
        <td><span class="type-badge ${badgeClass}">${r.type}</span></td>
        <td style="color:var(--text-muted)">${r.manager||'-'}</td>
        ${statusCell}
        <td><span class="remarks-text">${r.remarks||'-'}</span></td>
        ${linkCell}
        ${deleteCell}
      </tr>`;
    }).join('');
  }

  // =============================================
  // 단건 삭제
  // =============================================
  async function deleteSingle(event, idx) {
    event.stopPropagation();
    if (!isAdmin) return;
    if (!confirm('이 항목을 삭제할까요?')) return;
    showLoading('삭제 중...');
    try {
      await api({ action: 'delete', rowIndex: data[idx]._rowIndex });
      showToast('✅ 삭제되었습니다.');
      await loadData();
    } catch(e) {
      showToast('❌ 삭제 중 오류가 발생했습니다.');
    }
    hideLoading();
  }

  // =============================================
  // 상태 변경 / 링크 수정
  // =============================================
  async function toggleStatusEdit(cell, idx) {
    if (!isAdmin) return;
    if (cell.querySelector('.status-select')) return;
    const current = data[idx].status;
    cell.innerHTML = `
      <select class="status-select" onchange="changeStatus(this, ${idx})">
        <option value="진행중"  ${current==='진행중'  ?'selected':''}>진행중</option>
        <option value="신청" ${current==='신청'?'selected':''}>신청</option>
        <option value="완료"    ${current==='완료'   ?'selected':''}>완료</option>
      </select>`;
    cell.querySelector('.status-select').focus();
  }

  async function changeStatus(sel, idx) {
    const newStatus = sel.value;
    showLoading('저장 중...');
    try {
      await api({ action: 'updateStatus', rowIndex: data[idx]._rowIndex, status: newStatus });
      data[idx].status = newStatus;
      showToast('✅ 상태가 업데이트되었습니다.');
      render();
    } catch(e) {
      showToast('❌ 저장 실패');
    }
    hideLoading();
  }

  function toggleLinkEdit(cell, idx) {
    if (!isAdmin) return;
    if (cell.querySelector('.link-input')) return;
    const current = data[idx].link || '';
    cell.innerHTML = `
      <div class="link-input-wrap">
        <input class="link-input" type="url" value="${current}" placeholder="https://drive.google.com/..." id="link-input-${idx}">
        <button class="link-save-btn" onclick="saveLinkEdit(event, ${idx})">저장</button>
        <button class="link-cancel-btn" onclick="event.stopPropagation(); render()">✕</button>
      </div>`;
    cell.querySelector('.link-input').focus();
    cell.onclick = null;
  }

  async function saveLinkEdit(e, idx) {
    e.stopPropagation();
    const link = document.getElementById(`link-input-${idx}`).value.trim();
    showLoading('저장 중...');
    try {
      await api({ action: 'updateLink', rowIndex: data[idx]._rowIndex, link });
      data[idx].link = link;
      showToast('✅ 링크가 저장되었습니다.');
      render();
    } catch(e) {
      showToast('❌ 저장 실패');
    }
    hideLoading();
  }

  // =============================================
  // 새 요청 저장
  // =============================================
  function openModal()  { document.getElementById('modalOverlay').classList.add('show'); }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
  function closeModalOutside(e) { if (e.target.id === 'modalOverlay') closeModal(); }

  async function saveRow() {
    const date    = document.getElementById('f-date').value;
    const product = document.getElementById('f-product').value.trim();
    const country = document.getElementById('f-country').value.trim();
    const type    = document.getElementById('f-type').value;
    const manager = document.getElementById('f-manager').value.trim();
    const status  = document.getElementById('f-status').value;
    const remarks = document.getElementById('f-remarks').value.trim();
    const link    = document.getElementById('f-link').value.trim();
    if (!date || !product || !country) { alert('요청일자, 제품명, 국가는 필수입니다.'); return; }
    showLoading('저장 중...');
    try {
      await api({ action:'add', date, product, country, type, manager, status, remarks, link });
      showToast('✅ 새 요청이 등록되었습니다.');
      closeModal();
      ['f-product','f-country','f-link','f-manager','f-remarks'].forEach(id => document.getElementById(id).value = '');
      await loadData();
    } catch(e) {
      showToast('❌ 저장 실패. 다시 시도해주세요.');
    }
    hideLoading();
  }

  // =============================================
  // 필터 / 검색
  // =============================================
  function filterType(val, btn) {
    currentTypeFilter = val;
    document.querySelectorAll('[id^="type-btn"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  function filterStatus(val, btn) {
    currentStatusFilter = val;
    document.querySelectorAll('[id^="status-btn"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }
  function searchRows(q) { currentSearch = q; render(); }

  // =============================================
  // 시작
  // =============================================
  updateAdminUI();
  loadData();
</script>
</body>
</html>
