 "30", "cond": "27", "expr": "유해중금속과 독성이 없는 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10808"}, {"year": "2016", "seq": 2, "seqLabel": "제2차", "title": "2016년 제2차 광고자문위원회 관련", "date": "2016-01-26", "total": "71", "unfit": "30", "cond": "27", "expr": "세균번식, 박테리아, 곰팡이 등으로부터 피부를 보호", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10808"}, {"year": "2016", "seq": 2, "seqLabel": "제2차", "title": "2016년 제2차 광고자문위원회 관련", "date": "2016-01-26", "total": "71", "unfit": "30", "cond": "27", "expr": "신진대사를 정상화, 독소배출에 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10808"}, {"year": "2016", "seq": 2, "seqLabel": "제2차", "title": "2016년 제2차 광고자문위원회 관련", "date": "2016-01-26", "total": "71", "unfit": "30", "cond": "27", "expr": "달팽이는 자신의 껍데기에 상처가 나타났을 때 신속하게 치유할 수 있는 능력이 있는 것으로 알려져 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10808"}, {"year": "2016", "seq": 3, "seqLabel": "제3차", "title": "2016년 제3차 광고자문위원회 관련", "date": "2016-02-11", "total": "41", "unfit": "9", "cond": "19", "expr": "프로비타민 B5(덱스판테놀) : … 콜라겐 합성을 통하여 손상된 피부조직 재생에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10809"}, {"year": "2016", "seq": 3, "seqLabel": "제3차", "title": "2016년 제3차 광고자문위원회 관련", "date": "2016-02-11", "total": "41", "unfit": "9", "cond": "19", "expr": "글라이신 : 약 30%의 콜라겐 분자로 구성되어 있는 아미노산으로서 상처치유와 … 에 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10809"}, {"year": "2016", "seq": 3, "seqLabel": "제3차", "title": "2016년 제3차 광고자문위원회 관련", "date": "2016-02-11", "total": "41", "unfit": "9", "cond": "19", "expr": "상처치료 또는 상처치료 촉진용 약학 조성물 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10809"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "미세혈관을 확장시켜 혈액순환 촉진에 도움을 주고 재생능력을 증진시킵니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "체내 순환을 촉진시키고 근육을 풀어주어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "뭉치고 경직된 신체부위 및 근육의 피로감을 풀어주는데 효과적인 세럼", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "비싼 시술 대신 여성들의 피부고민을 ○○크림 하나로 해결해 줄 수 있다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "미세한 세균들까지 말끔하게 관리", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "이 식물은 수확 후 약 하루가 지나면 스스로 잎을 다시 재생시키는 능력을 지니고 있어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 4, "seqLabel": "제4차", "title": "2016년 제4차 광고자문위원회 관련", "date": "2016-03-07", "total": "106", "unfit": "40", "cond": "52", "expr": "세포의 분화 성장 항상성에 직접적으로 관여하는 중요한 성분입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10810"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "피부재생분야에 있어 최고의 연구진들이 화상치료용 인공피부 제조기술을 바탕으로 사람의 피부에 가장 적합한 성분과 생체재료기술을 이용하여 피부관리의 새로운 지평을 열 더멀매트릭스 스킨케어 제품을 개발", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "각종 증상완화, ○○는 중국의 고서 본초강목 및 명의별록에 ‘머리카락을 나게 한다‘ … 등의 기록이 전해내려 올 만큼 알려진 효능들이 정말 많습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "알려진 효능 : 화상, 피부상처, 욕창, 치질, 발진, 액취증, 수두, 대상포진, 사마귀 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "언론에서 인정받은 ○○○, 여성성기능 장애 해결 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "부작용이 거의 없는", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 5, "seqLabel": "제5차", "title": "2016년 제5차 광고자문위원회 관련", "date": "2016-03-14", "total": "44", "unfit": "28", "cond": "15", "expr": "인체의 면역 시스템을 조절하고 활성화시키는 역할을 하는 강력한 항염, 항주름, 항암물질로 사용되는 차세대 원료", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10811"}, {"year": "2016", "seq": 6, "seqLabel": "제6차", "title": "2016년 제6차 광고자문위원회 관련", "date": "2016-03-28", "total": "34", "unfit": "16", "cond": "14", "expr": "크기만 큰 가슴? no! 탄력 있고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10812"}, {"year": "2016", "seq": 6, "seqLabel": "제6차", "title": "2016년 제6차 광고자문위원회 관련", "date": "2016-03-28", "total": "34", "unfit": "16", "cond": "14", "expr": "주름이 없어지는 1분의 기적", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10812"}, {"year": "2016", "seq": 6, "seqLabel": "제6차", "title": "2016년 제6차 광고자문위원회 관련", "date": "2016-03-28", "total": "34", "unfit": "16", "cond": "14", "expr": "성기능 개선에도 도움을 줄 수 있는 41가지 유용한 성분들이 효과를 느낄 수 있을 만큼 들어있다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10812"}, {"year": "2016", "seq": 6, "seqLabel": "제6차", "title": "2016년 제6차 광고자문위원회 관련", "date": "2016-03-28", "total": "34", "unfit": "16", "cond": "14", "expr": "카퍼트리펩타이드-1 : 피부재생효과를 가져오며 인체의 혈액, 침 등에서 발견된 천연펩타이드입니다 … 손상된 콜라겐이나 엘라스틴을 제거하고, 흉터발생을 억제하며, Stem cell을 생성하여 피부재생을 돕습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10812"}, {"year": "2016", "seq": 6, "seqLabel": "제6차", "title": "2016년 제6차 광고자문위원회 관련", "date": "2016-03-28", "total": "34", "unfit": "16", "cond": "14", "expr": "아세틸헥사펩타이드-8 : 주름개선과 관련되어 보톡스와 유사한 기능을 갖습니다. 하지만 보톡스는 신경전달물질 분비에 관여하여 근육이 마비되는 효과를 가져오는 반면 AHP는 신경전달물질 분비를 저해하여 가역적으로 신경전달물질 분비를 조절하는 작용기전의 차이 때문에 보톡스에 비해 거의 독성이 없으므로 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10812"}, {"year": "2016", "seq": 7, "seqLabel": "제7차", "title": "2016년 제7차 광고자문위원회 관련", "date": "2016-04-12", "total": "47", "unfit": "12", "cond": "29", "expr": "지방분해효과 UP!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10813"}, {"year": "2016", "seq": 7, "seqLabel": "제7차", "title": "2016년 제7차 광고자문위원회 관련", "date": "2016-04-12", "total": "47", "unfit": "12", "cond": "29", "expr": "지방 분해에 효과가 탁월하다고 알려져 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10813"}, {"year": "2016", "seq": 7, "seqLabel": "제7차", "title": "2016년 제7차 광고자문위원회 관련", "date": "2016-04-12", "total": "47", "unfit": "12", "cond": "29", "expr": "카르니틴 : 몸의 대사를 활발하게 하여 지방 축적을 억제하고, 체지방을 태우는 비타민", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10813"}, {"year": "2016", "seq": 7, "seqLabel": "제7차", "title": "2016년 제7차 광고자문위원회 관련", "date": "2016-04-12", "total": "47", "unfit": "12", "cond": "29", "expr": "카페인 : 미세피부를 자극하여 군살제거에 효과적", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10813"}, {"year": "2016", "seq": 7, "seqLabel": "제7차", "title": "2016년 제7차 광고자문위원회 관련", "date": "2016-04-12", "total": "47", "unfit": "12", "cond": "29", "expr": "EGF는 세포재생인자로 상피세포의 성장을 도와 주름 개선 및 피부 재생 효과를 제공합니다. 피부의 표면에 있는 수용체와 결합되어 새로운 세포의 생산을 촉진하며 활성산소를 제거하고 피부세포를 재생시켜 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10813"}, {"year": "2016", "seq": 8, "seqLabel": "제8차", "title": "2016년 제8차 광고자문위원회 관련", "date": "2016-04-25", "total": "33", "unfit": "13", "cond": "16", "expr": "항암치료 부작용으로 피부 장벽이 손상되어 극히 건조해지고 예민해진 피부를 위한 전문제품을 개발하는 과정에서, … 바르는 즉시 피부 장벽회복을 돕는 배리어 리페어 콤플렉스 성분이 고안되었습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10814"}, {"year": "2016", "seq": 8, "seqLabel": "제8차", "title": "2016년 제8차 광고자문위원회 관련", "date": "2016-04-25", "total": "33", "unfit": "13", "cond": "16", "expr": "손상된 피부장벽을 즉각적으로 회복시키며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10814"}, {"year": "2016", "seq": 8, "seqLabel": "제8차", "title": "2016년 제8차 광고자문위원회 관련", "date": "2016-04-25", "total": "33", "unfit": "13", "cond": "16", "expr": "손상된 피부 재생에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10814"}, {"year": "2016", "seq": 8, "seqLabel": "제8차", "title": "2016년 제8차 광고자문위원회 관련", "date": "2016-04-25", "total": "33", "unfit": "13", "cond": "16", "expr": "마치현 추출물 : 상처를 치유하고 항균ㆍ항염 작용이 뛰어납니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10814"}, {"year": "2016", "seq": 8, "seqLabel": "제8차", "title": "2016년 제8차 광고자문위원회 관련", "date": "2016-04-25", "total": "33", "unfit": "13", "cond": "16", "expr": "뾰루지 잡는 안티 스팟 트리트먼트, 뾰루지 제대로 잡는 파워 트리트먼트", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10814"}, {"year": "2016", "seq": 9, "seqLabel": "제9차", "title": "2016년 제9차 광고자문위원회 관련", "date": "2016-05-19", "total": "64", "unfit": "9", "cond": "32", "expr": "최첨단 생명과학 기술로 아미노산의 서열을 최적화시켜 피부를 통해 흡수시켜도 체내에서 형성되는 단백질들과 유사한 효능을 가져, 선천적으로 혹은 노화로 저하된 피부 재생 능력을 되살려줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10815"}, {"year": "2016", "seq": 9, "seqLabel": "제9차", "title": "2016년 제9차 광고자문위원회 관련", "date": "2016-05-19", "total": "64", "unfit": "9", "cond": "32", "expr": "비만, 당뇨, 동맥경화 등 대사성질환을 개선하는 착한 호르몬 ‘○○○’에서 유래한 트라이펩타이드입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10815"}, {"year": "2016", "seq": 9, "seqLabel": "제9차", "title": "2016년 제9차 광고자문위원회 관련", "date": "2016-05-19", "total": "64", "unfit": "9", "cond": "32", "expr": "사용 권장 피부 타입 :시술 및 상처 등으로 손상되어 회복이 필요한 피부 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10815"}, {"year": "2016", "seq": 9, "seqLabel": "제9차", "title": "2016년 제9차 광고자문위원회 관련", "date": "2016-05-19", "total": "64", "unfit": "9", "cond": "32", "expr": "빠르게 회복될 수 있도록 돕는 고기능성 크림입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10815"}, {"year": "2016", "seq": 10, "seqLabel": "제10차", "title": "2016년 제10차 광고자문위원회 관련", "date": "2016-05-31", "total": "28", "unfit": "9", "cond": "11", "expr": "피나무추출물: 염증을 없애는 효과, 캐모마일추출물: 피부염에 효과, 천궁추출물: 피부재생에 효과 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10817"}, {"year": "2016", "seq": 10, "seqLabel": "제10차", "title": "2016년 제10차 광고자문위원회 관련", "date": "2016-05-31", "total": "28", "unfit": "9", "cond": "11", "expr": "관절 부위 피부에도 사용하면 너무 좋습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10817"}, {"year": "2016", "seq": 10, "seqLabel": "제10차", "title": "2016년 제10차 광고자문위원회 관련", "date": "2016-05-31", "total": "28", "unfit": "9", "cond": "11", "expr": "마유는 중국의 고전의학서 명의별록 및 본초강목에 '머리카락을 나게 한다', … '혈액순환을 도와준다' 등의 기록이 전해지며, 예로부터 일본 등 아시아 지역에서 화상이나 아토피피부염 치료제로 널리 사용되어 왔다 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10817"}, {"year": "2016", "seq": 10, "seqLabel": "제10차", "title": "2016년 제10차 광고자문위원회 관련", "date": "2016-05-31", "total": "28", "unfit": "9", "cond": "11", "expr": "여성의 궁에 사용하는 제품은 특별해야합니다, 여성의 궁 전용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10817"}, {"year": "2016", "seq": 11, "seqLabel": "제11차", "title": "2016년 제11차 광고자문위원회 관련", "date": "2016-06-14", "total": "26", "unfit": "14", "cond": "7", "expr": "질건조증 해결", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10818"}, {"year": "2016", "seq": 11, "seqLabel": "제11차", "title": "2016년 제11차 광고자문위원회 관련", "date": "2016-06-14", "total": "26", "unfit": "14", "cond": "7", "expr": "잘 부러지고, 누렇거나 검게 변색된 손•발톱을 건강하게 …, 외부유해환경이 쉽게 부러지는 손톱, 변색 등의 원인이 되며 000은 손발톱의 pH를 낮춰 외부 유해물질의 활성을 낮추는데 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10818"}, {"year": "2016", "seq": 11, "seqLabel": "제11차", "title": "2016년 제11차 광고자문위원회 관련", "date": "2016-06-14", "total": "26", "unfit": "14", "cond": "7", "expr": "기저귀 사용으로 발진이나 가려움 때문에 고생하는 우리 아기에게 000 하나면 딱 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10818"}, {"year": "2016", "seq": 11, "seqLabel": "제11차", "title": "2016년 제11차 광고자문위원회 관련", "date": "2016-06-14", "total": "26", "unfit": "14", "cond": "7", "expr": "비염과 코막힘에 효능이 있는 유칼립투스잎 오일 사용으로 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10818"}, {"year": "2016", "seq": 12, "seqLabel": "제12차", "title": "2016년 제12차 광고자문위원회 관련", "date": "2016-06-27", "total": "44", "unfit": "15", "cond": "24", "expr": "항염증효능과 면역억제능력을 동시에 갖고 있으면서 의약원료와 같은 단일 성분이 아니라 7가지 식물성 성분들이 적절한 배합비로 혼합된 복합천연 성분으로 국내, 국제특허를 받은 원료", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10819"}, {"year": "2016", "seq": 12, "seqLabel": "제12차", "title": "2016년 제12차 광고자문위원회 관련", "date": "2016-06-27", "total": "44", "unfit": "15", "cond": "24", "expr": "항염 기능도 가지고 있어 여드름이나 지성피부 트러블 개선에도 효과적 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10819"}, {"year": "2016", "seq": 12, "seqLabel": "제12차", "title": "2016년 제12차 광고자문위원회 관련", "date": "2016-06-27", "total": "44", "unfit": "15", "cond": "24", "expr": "팔미토일올리고펩타이드 : 손상된 피부의 콜라겐과 엘라스틴을 생성 및 세포 재생을 도와 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10819"}, {"year": "2016", "seq": 12, "seqLabel": "제12차", "title": "2016년 제12차 광고자문위원회 관련", "date": "2016-06-27", "total": "44", "unfit": "15", "cond": "24", "expr": "피부재생 메커니즘에 근거한 피부 성장인자들의 이상적인 배합", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10819"}, {"year": "2016", "seq": 13, "seqLabel": "제13차", "title": "2016년 제13차 광고자문위원회 관련", "date": "2016-07-13", "total": "46", "unfit": "8", "cond": "32", "expr": "피부의 면역력을 증가시켜 손상된 피부 세포에 항염 기능으로 피부 손상을 회복시켜 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10820"}, {"year": "2016", "seq": 13, "seqLabel": "제13차", "title": "2016년 제13차 광고자문위원회 관련", "date": "2016-07-13", "total": "46", "unfit": "8", "cond": "32", "expr": "지치고 손상된 피부를 진피층부터 에너지를 공급&재생시켜 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10820"}, {"year": "2016", "seq": 14, "seqLabel": "제14차", "title": "2016년 제14차 광고자문위원회 관련", "date": "2016-07-25", "total": "75", "unfit": "18", "cond": "51", "expr": "자궁팩, 질내부 pH유지, 질 내부의 산도 유지, 질염 완화", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10821"}, {"year": "2016", "seq": 14, "seqLabel": "제14차", "title": "2016년 제14차 광고자문위원회 관련", "date": "2016-07-25", "total": "75", "unfit": "18", "cond": "51", "expr": "곰팡이, 세균, 바이러스 감염으로부터 여성Y존을 보호하는데 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10821"}, {"year": "2016", "seq": 14, "seqLabel": "제14차", "title": "2016년 제14차 광고자문위원회 관련", "date": "2016-07-25", "total": "75", "unfit": "18", "cond": "51", "expr": "유산균이 알러지나 악취를 유발하는 물질, 곰팡이등의 서식 환경등을 제어함으로 근본적인 문제의 해결에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10821"}, {"year": "2016", "seq": 15, "seqLabel": "제15차", "title": "2016년 제15차 광고자문위원회 관련", "date": "2016-08-23", "total": "91", "unfit": "22", "cond": "53", "expr": "식이유황MSM이란? … 에너지 증가에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10822"}, {"year": "2016", "seq": 15, "seqLabel": "제15차", "title": "2016년 제15차 광고자문위원회 관련", "date": "2016-08-23", "total": "91", "unfit": "22", "cond": "53", "expr": "부신피질호르몬제와 같은 부작용은 없습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10822"}, {"year": "2016", "seq": 15, "seqLabel": "제15차", "title": "2016년 제15차 광고자문위원회 관련", "date": "2016-08-23", "total": "91", "unfit": "22", "cond": "53", "expr": "이젠 스테로이드 대신 천연 생약성분인 ○○크림을 쓰세요", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10822"}, {"year": "2016", "seq": 15, "seqLabel": "제15차", "title": "2016년 제15차 광고자문위원회 관련", "date": "2016-08-23", "total": "91", "unfit": "22", "cond": "53", "expr": "(일반화장품) 이런분께 추천해드립니다! 칙칙한 안색, 기미, 잡티 등으로 고민하시는 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10822"}, {"year": "2016", "seq": 16, "seqLabel": "제16차", "title": "2016년 제16차 광고자문위원회 관련", "date": "2016-08-31", "total": "39", "unfit": "14", "cond": "22", "expr": "항염, 항알레르기, 아토피 개선 효능이 있으며 독성과 자극이 없고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10823"}, {"year": "2016", "seq": 16, "seqLabel": "제16차", "title": "2016년 제16차 광고자문위원회 관련", "date": "2016-08-31", "total": "39", "unfit": "14", "cond": "22", "expr": "세포 재생 촉진 : 피부의 상처난 곳에 세포재생을 도와 작은 상처부위, 트러블 치유에 도움을 줍니다. 피부에 사용 시 건강한 피부의 세포재생을 촉진 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10823"}, {"year": "2016", "seq": 16, "seqLabel": "제16차", "title": "2016년 제16차 광고자문위원회 관련", "date": "2016-08-31", "total": "39", "unfit": "14", "cond": "22", "expr": "은 부작용이 적은 천연대사물질 … 면역증진 효과와 생물의 성장촉진 또는 억제효과를 제공하고 내성 발생이 없는 천연활성물질", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10823"}, {"year": "2016", "seq": 16, "seqLabel": "제16차", "title": "2016년 제16차 광고자문위원회 관련", "date": "2016-08-31", "total": "39", "unfit": "14", "cond": "22", "expr": "카페인을 통한 지방 축적억제, 지방 분해 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10823"}, {"year": "2016", "seq": 16, "seqLabel": "제16차", "title": "2016년 제16차 광고자문위원회 관련", "date": "2016-08-31", "total": "39", "unfit": "14", "cond": "22", "expr": "지방 축적억제 특허 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10823"}, {"year": "2016", "seq": 17, "seqLabel": "제17차", "title": "2016년 제17차 광고자문위원회 관련", "date": "2016-09-21", "total": "44", "unfit": "14", "cond": "23", "expr": "부작용이 없다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10824"}, {"year": "2016", "seq": 17, "seqLabel": "제17차", "title": "2016년 제17차 광고자문위원회 관련", "date": "2016-09-21", "total": "44", "unfit": "14", "cond": "23", "expr": "세계적으로 저명한 과학저널 ‘Science’, ‘cell’등의 찬사를 받은 차세대 생명연장물질입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10824"}, {"year": "2016", "seq": 17, "seqLabel": "제17차", "title": "2016년 제17차 광고자문위원회 관련", "date": "2016-09-21", "total": "44", "unfit": "14", "cond": "23", "expr": "이럴 때 사용하세요, 피부가 가려울 때(소양증).", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10824"}, {"year": "2016", "seq": 18, "seqLabel": "제18차", "title": "2016년 제18차 광고자문위원회 관련", "date": "2016-09-29", "total": "38", "unfit": "4", "cond": "31", "expr": "PDRN (Polydeoxyribonucleotide) (ABOUT INGREDIENT); 피부재생 신호전달체인 A2 수용체를 자극하여 각종 성장인자분비촉진, 혈관내피세포증식인자에 의한 세포주기 활성, 피부 단백질 강화에 도움을 줍니다. … 유럽에서는 화상 전문 치료제로, 손상된 연골과 뼈의 재생에 사용하기도 합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10825"}, {"year": "2016", "seq": 18, "seqLabel": "제18차", "title": "2016년 제18차 광고자문위원회 관련", "date": "2016-09-29", "total": "38", "unfit": "4", "cond": "31", "expr": "글루타치온은 (ABOUT INGREDIENT) 해독, 면역기능 강화의 효과를 가지고 있다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10825"}, {"year": "2016", "seq": 19, "seqLabel": "제19차", "title": "2016년 제19차 광고자문위원회 관련", "date": "2016-10-24", "total": "73", "unfit": "17", "cond": "55", "expr": "여성의 Y존에 작용하여 유익균을 보호", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10826"}, {"year": "2016", "seq": 19, "seqLabel": "제19차", "title": "2016년 제19차 광고자문위원회 관련", "date": "2016-10-24", "total": "73", "unfit": "17", "cond": "55", "expr": "은 재생 및 대사활성을 갖도록 최적화한 물질", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10826"}, {"year": "2016", "seq": 19, "seqLabel": "제19차", "title": "2016년 제19차 광고자문위원회 관련", "date": "2016-10-24", "total": "73", "unfit": "17", "cond": "55", "expr": "더욱 강력해진 피부재생력 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10826"}, {"year": "2016", "seq": 19, "seqLabel": "제19차", "title": "2016년 제19차 광고자문위원회 관련", "date": "2016-10-24", "total": "73", "unfit": "17", "cond": "55", "expr": "마데카소사이드는 … 호랑이풀이라고도 합니다. 호랑이가 상처를 입었을 때 이 풀 위에서 구르며 스스로 상처를 치료한다고 알려져 붙여진 별명입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10826"}, {"year": "2016", "seq": 20, "seqLabel": "제20차", "title": "2016년 제20차 광고자문위원회 관련", "date": "2016-11-10", "total": "91", "unfit": "17", "cond": "58", "expr": "아미노산 펩타이드는 … 체내 축척되거나 독성을 보이지 않습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10827"}, {"year": "2016", "seq": 20, "seqLabel": "제20차", "title": "2016년 제20차 광고자문위원회 관련", "date": "2016-11-10", "total": "91", "unfit": "17", "cond": "58", "expr": "피부조직의 재생 및 회복에 도움이 될 수 있는 저분자 히알루론산 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10827"}, {"year": "2016", "seq": 21, "seqLabel": "제21차", "title": "2016년 제21차 광고자문위원회 관련", "date": "2016-11-21", "total": "71", "unfit": "26", "cond": "38", "expr": "필라그리놀 성분으로 필라그린을 활성화하여 … 세라마이드 생성에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10828"}, {"year": "2016", "seq": 21, "seqLabel": "제21차", "title": "2016년 제21차 광고자문위원회 관련", "date": "2016-11-21", "total": "71", "unfit": "26", "cond": "38", "expr": "최근 젊은 마우스 혈액을 노령 마우스에 관류시켰을 때 신경, 근육 등의 조직이 젊어지는 것을 확인하였고, 이러한 효과가 혈중에 존재하는 ○○○에 기인하는 것임을 확인함 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10828"}, {"year": "2016", "seq": 21, "seqLabel": "제21차", "title": "2016년 제21차 광고자문위원회 관련", "date": "2016-11-21", "total": "71", "unfit": "26", "cond": "38", "expr": "프리바이오틱스는 체내 정상 미생물의 성장이나 활성을 촉진시키는 데 도움이 되는 것으로 알려져 있는 성분으로서, 프로바이오틱스의 빠른 생장을 촉진시키는 역할 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10828"}, {"year": "2016", "seq": 22, "seqLabel": "제22차", "title": "2016년 제22차 광고자문위원회 관련", "date": "2016-12-02", "total": "55", "unfit": "13", "cond": "35", "expr": "동의보감은 허준에 의해 1610년 편찬되어 당대의 동아시아 의학지식을 집대성한 한의서이다 … 조청은 동의보감에서 … 약명으로 기록되어 기운을 돋게 하는 약재로 소개됩니다, 쑥은 동의보감에서 … 약명으로 기록되어 백병을 구하는 약재로 소개됩니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10829"}, {"year": "2016", "seq": 22, "seqLabel": "제22차", "title": "2016년 제22차 광고자문위원회 관련", "date": "2016-12-02", "total": "55", "unfit": "13", "cond": "35", "expr": "아기피부 … 면역력을 높여주는데 도움을 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10829"}, {"year": "2016", "seq": 23, "seqLabel": "제23차", "title": "2016년 제23차 광고자문위원회 관련", "date": "2016-12-20", "total": "37", "unfit": "7", "cond": "21", "expr": "아기들의 피부에 사용해도 안전한 오일로 … 유아 습진 … 등에 특히 효과적입니다", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10830"}, {"year": "2016", "seq": 23, "seqLabel": "제23차", "title": "2016년 제23차 광고자문위원회 관련", "date": "2016-12-20", "total": "37", "unfit": "7", "cond": "21", "expr": "아르간 오일 활용 베이비 케어 TIP_ 기저귀 발진/ 유아 지방관 /신생아 여드름", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10830"}, {"year": "2016", "seq": 23, "seqLabel": "제23차", "title": "2016년 제23차 광고자문위원회 관련", "date": "2016-12-20", "total": "37", "unfit": "7", "cond": "21", "expr": "모로코인은 아르간 오일을 수백년간 각종 피부 질환을 다스리는 천연 치료제로 사용해왔으며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10830"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "피부 재생 화장품", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "골드콜로이드 : 해독작용에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "가려움으로 잠못드는 밤! 더 이상 고민하지 마세요!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "구아바의 … 잎에 많이 함유되어 있는 폴리페놀 성분은 아토피 완화에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "감초 : 해독작용, 간염, 두드러기, 피부염, 습진 등에 효과가 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "사용대상 … 풍성한 머리카락을 원하시는 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "금은 인체내의 각종 유독물질을 흡수하여 몸 밖으로 배출하는 피부 정화 작용에 도움을 주는 성분입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2016", "seq": 24, "seqLabel": "제24차", "title": "2016년 제24차 광고자문위원회 관련", "date": "2016-12-28", "total": "38", "unfit": "18", "cond": "20", "expr": "강황에는 항암성분, 항종양성분, 소염성분 등 다양한 성분을 포함하여 각종 피부 고민을 위한 해결사로 불립니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10831"}, {"year": "2017", "seq": 1, "seqLabel": "제1차", "title": "2017년 제1차 광고자문위원회 관련", "date": "2017-01-17", "total": "43", "unfit": "12", "cond": "28", "expr": "항암, 면역증강, 항피로, 노화방지 효과로 알려진 동충하초 추출물 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10832"}, {"year": "2017", "seq": 1, "seqLabel": "제1차", "title": "2017년 제1차 광고자문위원회 관련", "date": "2017-01-17", "total": "43", "unfit": "12", "cond": "28", "expr": "역사 속 동충하초 이야기 … 95세까지 장수한 등소평이 상시 복용한 동충하초!/중국육상선수팀이 세계기록을 속출하였을 때 그 이유를 묻자 '동충하초 드링크를 매일 마셔요'라고 인터뷰함", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10832"}, {"year": "2017", "seq": 1, "seqLabel": "제1차", "title": "2017년 제1차 광고자문위원회 관련", "date": "2017-01-17", "total": "43", "unfit": "12", "cond": "28", "expr": "사용대상 : 펌은 필수! 휑한 정수리 때문에 지하철이나 버스에 앉는게 불편하신 분/가발을 착용하시는 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10832"}, {"year": "2017", "seq": 1, "seqLabel": "제1차", "title": "2017년 제1차 광고자문위원회 관련", "date": "2017-01-17", "total": "43", "unfit": "12", "cond": "28", "expr": "성형외과 전문의 Dr.Lee(○○원장)와 ○○이…오랜 연구 끝에 개발하여 출시한 제품", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10832"}, {"year": "2017", "seq": 2, "seqLabel": "제2차", "title": "2017년 제2차 광고자문위원회 관련", "date": "2017-02-01", "total": "35", "unfit": "17", "cond": "15", "expr": "세포 사이사이까지 유효성분을 전달하여 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10835"}, {"year": "2017", "seq": 2, "seqLabel": "제2차", "title": "2017년 제2차 광고자문위원회 관련", "date": "2017-02-01", "total": "35", "unfit": "17", "cond": "15", "expr": "비타민과 항산화 성분이 풍부한 OOO은 피부를 손상시키는 활성산소의 중성화에 매우 효과적", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10835"}, {"year": "2017", "seq": 2, "seqLabel": "제2차", "title": "2017년 제2차 광고자문위원회 관련", "date": "2017-02-01", "total": "35", "unfit": "17", "cond": "15", "expr": "OOO는 원주민들이 몸에 자극을 받았을 때 바르던 귀한 풀로 아주 오래 전부터 민간 요법으로 많이 사용되어온 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10835"}, {"year": "2017", "seq": 3, "seqLabel": "제3차", "title": "2017년 제3차 광고자문위원회 관련", "date": "2017-02-09", "total": "23", "unfit": "7", "cond": "12", "expr": "여성의 Y존은 점막으로 덮여 있고, 많은 혈관과 림프관으로 이루어져 있어 다른 피부보다 투과성이 높으며 청결과 정상 범위의 pH 유지가 중요합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10836"}, {"year": "2017", "seq": 3, "seqLabel": "제3차", "title": "2017년 제3차 광고자문위원회 관련", "date": "2017-02-09", "total": "23", "unfit": "7", "cond": "12", "expr": "OOO 속 줄기세포는 놀라운 피부 재생 효과를 품고 있습니다. 이는 피부 속 세포를 자극하여 세포의 수와 생명을 증가시켜 피부 재생을 촉진시키는 것은 물론 외부 유해 환경과 시간에서 오는 손상으로부터 피부를 보호합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10836"}, {"year": "2017", "seq": 3, "seqLabel": "제3차", "title": "2017년 제3차 광고자문위원회 관련", "date": "2017-02-09", "total": "23", "unfit": "7", "cond": "12", "expr": "독소물질 제거", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10836"}, {"year": "2017", "seq": 4, "seqLabel": "제4차", "title": "2017년 제4차 광고자문위원회 관련", "date": "2017-02-27", "total": "42", "unfit": "19", "cond": "17", "expr": "피부의 신진대사 촉진, 모공의 단백질 응고 작용, 피지 분비 억제", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10837"}, {"year": "2017", "seq": 4, "seqLabel": "제4차", "title": "2017년 제4차 광고자문위원회 관련", "date": "2017-02-27", "total": "42", "unfit": "19", "cond": "17", "expr": "강력한 비듬 방지 성분 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10837"}, {"year": "2017", "seq": 4, "seqLabel": "제4차", "title": "2017년 제4차 광고자문위원회 관련", "date": "2017-02-27", "total": "42", "unfit": "19", "cond": "17", "expr": "탈모 예방과 모발 복구 테라피", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10837"}, {"year": "2017", "seq": 5, "seqLabel": "제5차", "title": "2017년 제5차 광고자문위원회 관련", "date": "2017-03-15", "total": "77", "unfit": "26", "cond": "44", "expr": "1950년대 독일의 피부과 전문의 크리스틴 슈라멕이 환자들이 박피와 같은 피부 시술 후에 바르도록 개발한 것이 시초이다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10838"}, {"year": "2017", "seq": 5, "seqLabel": "제5차", "title": "2017년 제5차 광고자문위원회 관련", "date": "2017-03-15", "total": "77", "unfit": "26", "cond": "44", "expr": "살균 효과로 피부 악순환을 막아주는 지혜로운 커버 쿠션", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10838"}, {"year": "2017", "seq": 5, "seqLabel": "제5차", "title": "2017년 제5차 광고자문위원회 관련", "date": "2017-03-15", "total": "77", "unfit": "26", "cond": "44", "expr": "목 주변의 지방세포 생성을 억제시킴으로 피부탄력을 향상 시켜줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10838"}, {"year": "2017", "seq": 6, "seqLabel": "제6차", "title": "2017년 제6차 광고자문위원회 관련", "date": "2017-03-28", "total": "31", "unfit": "12", "cond": "17", "expr": "약 20종의 미네랄과 풍부한 영양이 함유된 사해 소금이 피부의 염증을 제거해주고 피부 재생을 도우며", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10839"}, {"year": "2017", "seq": 6, "seqLabel": "제6차", "title": "2017년 제6차 광고자문위원회 관련", "date": "2017-03-28", "total": "31", "unfit": "12", "cond": "17", "expr": "피부에 유익한 활성물질 생성을 돕고 항산화, 면역력을 강화시켜주는", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10839"}, {"year": "2017", "seq": 6, "seqLabel": "제6차", "title": "2017년 제6차 광고 ": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10854"}, {"year": "2017", "seq": 20, "seqLabel": "제20차", "title": "2017년 제20차 광고자문위원회 관련", "date": "2017-10-31", "total": "36", "unfit": "13", "cond": "17", "expr": "(일반화장품에서) 미백과 항주름 효과를 가진 성분으로 민감한 피부를 진정, 보호해 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10854"}, {"year": "2017", "seq": 20, "seqLabel": "제20차", "title": "2017년 제20차 광고자문위원회 관련", "date": "2017-10-31", "total": "36", "unfit": "13", "cond": "17", "expr": "Regeneration 세포막 재생 젊은 세포 유지", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10854"}, {"year": "2017", "seq": 21, "seqLabel": "제21차", "title": "2017년 제21차 광고자문위원회 관련", "date": "2017-11-22", "total": "83", "unfit": "29", "cond": "47", "expr": "갈라진 뒤꿈치! 딱딱하고…", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10855"}, {"year": "2017", "seq": 21, "seqLabel": "제21차", "title": "2017년 제21차 광고자문위원회 관련", "date": "2017-11-22", "total": "83", "unfit": "29", "cond": "47", "expr": "울퉁불퉁 성난피부, 붉게오른 화난피부 너와의 결별을 선포한다!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10855"}, {"year": "2017", "seq": 21, "seqLabel": "제21차", "title": "2017년 제21차 광고자문위원회 관련", "date": "2017-11-22", "total": "83", "unfit": "29", "cond": "47", "expr": "피부 속 깊이 전달되어, 이상적인 피부 환경과 더불어 피부 세포의 신진대사를 활발하게 도와줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10855"}, {"year": "2017", "seq": 21, "seqLabel": "제21차", "title": "2017년 제21차 광고자문위원회 관련", "date": "2017-11-22", "total": "83", "unfit": "29", "cond": "47", "expr": "성난피부를 유발하는 과잉 피지를 흡착하고 뾰루지 예방에 도움을 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10855"}, {"year": "2017", "seq": 22, "seqLabel": "제22차", "title": "2017년 제22차 광고자문위원회 관련", "date": "2017-12-05", "total": "33", "unfit": "17", "cond": "8", "expr": "피부의 지질 생성을 촉진하는 수용체를 자극", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10856"}, {"year": "2017", "seq": 22, "seqLabel": "제22차", "title": "2017년 제22차 광고자문위원회 관련", "date": "2017-12-05", "tot a.or.kr/ad/cs/notice.php?type=view&no=10864"}, {"year": "2018", "seq": 6, "seqLabel": "제6차", "title": "2018년 제6차 광고자문위원회 관련", "date": "2018-03-28", "total": "65", "unfit": "25", "cond": "36", "expr": "꺼진 피부가 고민이신 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10865"}, {"year": "2018", "seq": 6, "seqLabel": "제6차", "title": "2018년 제6차 광고자문위원회 관련", "date": "2018-03-28", "total": "65", "unfit": "25", "cond": "36", "expr": "금 성분이 피부를 맑고 밝게 가꾸어줍니다.(나이아신아마이드가 주성분인 미백 기능성화장품에서)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10865"}, {"year": "2018", "seq": 6, "seqLabel": "제6차", "title": "2018년 제6차 광고자문위원회 관련", "date": "2018-03-28", "total": "65", "unfit": "25", "cond": "36", "expr": "세포건강을 촉진하고 세균의 성장을 억제시키며 피부에 편안한 휴식을 주고 살균과 소독을 해주는 효과가 있어 우리몸의 독성을 해독해주고 스트레스를 완화시켜준다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10865"}, {"year": "2018", "seq": 6, "seqLabel": "제6차", "title": "2018년 제6차 광고자문위원회 관련", "date": "2018-03-28", "total": "65", "unfit": "25", "cond": "36", "expr": "스트레스성 탈모를 개선해주는 착한 OO", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10865"}, {"year": "2018", "seq": 7, "seqLabel": "제7차", "title": "2018년 제7차 광고자문위원회 관련", "date": "2018-04-18", "total": "48", "unfit": "32", "cond": "12", "expr": "세포내 성분으로 안정성이 높으며 세포 스스로의 자생력으로 피부의 건강과 젊음을 유지", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10866"}, {"year": "2018", "seq": 7, "seqLabel": "제7차", "title": "2018년 제7차 광고자문위원회 관련", "date": "2018-04-18", "total": "48", "unfit": "32", "cond": "12", "expr": "오래전부터 민간에서는 피부질환이나 미용 목적으로 많이 사용되고 있었던 약용식물로 피부 혈액순환 촉진", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10866"}, {"year": "2018", "seq": 7, "seqLabel": "제7차", "title": "2018년 제7차 광고자문위원회 관련", "date": "2018-04-18", "total": "48", "unfit": "32", "cond": "12", "expr": "유아 두드러기, 땀띠", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10866"}, {"year": "2018", "seq": 7, "seqLabel": "제7차", "title": "2018년 제7차 광고자문위원회 관련", "date": "2018-04-18", let filtered = [];
let currentQuery = '';
let activeYear = 'all';
let activeType = 'all';
let currentPage = 1;
const PER_PAGE = 30;

// 연도 필터 생성
const years = [...new Set(KCA_DATA.map(d => d.year))].sort();
const yf = document.getElementById('yearFilters');
['all', ...years].forEach(y => {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (y === 'all' ? ' active' : '');
  b.textContent = y === 'all' ? '전체' : y + '년';
  b.dataset.year = y;
  b.onclick = function() {
    document.querySelectorAll('#yearFilters .filter-btn').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    activeYear = y;
    if (currentQuery) doSearch(); else showInitial();
  };
  yf.appendChild(b);
});

function setType(btn) {
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeType = btn.dataset.type;
  if (currentQuery) doSearch(); else showInitial();
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  currentQuery = q;
  currentPage = 1;
  if (!q) { showInitial(); return; }

  const tokens = q.split(' ').filter(function(t) { return t.length > 0; });
  let pool = KCA_DATA;

  if (activeYear !== 'all') pool = pool.filter(function(d) { return d.year === activeYear; });
  if (activeType === 'unfit') pool = pool.filter(function(d) { return parseInt(d.unfit || 0) > 0; });
  else if (activeType === 'cond') pool = pool.filter(function(d) { return parseInt(d.cond || 0) > 0; });

  filtered = [];
  for (let i = 0; i < pool.length; i++) {
    const d = pool[i];
    const haystack = (d.expr + ' ' + d.title).toLowerCase();
    let score = 0;
    let allMatch = true;
    for (let j = 0; j < tokens.length; j++) {
      const tl = tokens[j].toLowerCase();
      if (haystack.indexOf(tl) === -1) { allMatch = false; break; }
      if (d.expr.toLowerCase().indexOf(tl) !== -1) score += 10;
      else score += 3;
    }
    if (allMatch) filtered.push(Object.assign({}, d, { score: score }));
  }

  renderPage(1);
}

function getSorted() {
  const sort = document.getElementById('sortSelect').value;
  const arr = filtered.slice();
  if (sort === 'new') return arr.sort(function(a,b) { return b.date > a.date ? 1 : -1; });
  if (sort === 'old') return arr.sort(function(a,b) { return a.date > b.date ? 1 : -1; });
  return arr.sort(function(a,b) { return b.score - a.score; });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return escHtml(text);
  const tokens = q.split(' ').filter(function(t) { return t.length > 0; });
  let result = escHtml(text);
  for (let i = 0; i < tokens.length; i++) {
    const t = escHtml(tokens[i]);
    // 대소문자 무시 치환
    const lower = result.toLowerCase();
    const tLower = t.toLowerCase();
    let out = '';
    let idx = 0;
    while (true) {
      const found = lower.indexOf(tLower, idx);
      if (found === -1) { out += result.substring(idx); break; }
      out += result.substring(idx, found) + '<mark>' + result.substring(found, found + t.length) + '</mark>';
      idx = found + t.length;
    }
    result = out;
  }
  return result;
}

function renderPage(page) {
  currentPage = page;
  const sorted = getSorted();
  const total = sorted.length;
  const totalPages = Math.ceil(total / PER_PAGE);
  const slice = sorted.slice((page-1)*PER_PAGE, page*PER_PAGE);

  document.getElementById('initialState').style.display = 'none';
  document.getElementById('resultsMeta').style.display = 'flex';
  document.getElementById('resultsCount').innerHTML =
    '"<strong>' + escHtml(currentQuery) + '</strong>" 검색 결과 <strong>' + total.toLocaleString() + '</strong>건';

  const list = document.getElementById('cardList');
  if (total === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><h3>검색 결과가 없습니다</h3><p>"' + escHtml(currentQuery) + '"와 관련된 지적 사례를 찾지 못했습니다. 다른 키워드로 검색해보세요.</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = slice.map(function(d) {
    const isUnfit = parseInt(d.unfit || 0) > 0;
    const iconClass = isUnfit ? 'icon-unfit' : 'icon-cond';
    const icon = isUnfit ? '🚫' : '⚠️';
    const typeTag = isUnfit
      ? '<span class="tag tag-unfit">부적합</span>'
      : '<span class="tag tag-cond">조건부</span>';
    return '<div class="expr-card">' +
      '<div class="expr-icon ' + iconClass + '">' + icon + '</div>' +
      '<div class="card-body">' +
        '<div class="expr-text">' + highlight(d.expr, currentQuery) + '</div>' +
        '<div class="card-meta">' +
          '<span class="tag tag-year">' + escHtml(d.year) + '년</span>' +
          '<span class="tag tag-seq">' + escHtml(d.seqLabel) + '</span>' +
          typeTag +
          '<span class="tag tag-date">' + escHtml(d.date) + '</span>' +
        '</div>' +
      '</div>' +
      '<a class="card-link" href="' + escHtml(d.link) + '" target="_blank" rel="noopener">원문 ↗</a>' +
    '</div>';
  }).join('');

  renderPagination(page, totalPages);
}

function renderPagination(cur, total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  let html = '';
  html += '<button class="page-btn" onclick="renderPage(' + (cur-1) + ')" ' + (cur>1 ? '' : 'disabled') + '>‹</button>';
  const start = Math.max(1, cur-3), end = Math.min(total, cur+3);
  if (start > 1) html += '<button class="page-btn" onclick="renderPage(1)">1</button>' + (start>2 ? '<span style="padding:0 4px;color:#aaa">…</span>' : '');
  for (let p = start; p <= end; p++) {
    html += '<button class="page-btn ' + (p===cur?'active':'') + '" onclick="renderPage(' + p + ')">' + p + '</button>';
  }
  if (end < total) html += (end<total-1 ? '<span style="padding:0 4px;color:#aaa">…</span>' : '') + '<button class="page-btn" onclick="renderPage(' + total + ')">' + total + '</button>';
  html += '<button class="page-btn" onclick="renderPage(' + (cur+1) + ')" ' + (cur<total ? '' : 'disabled') + '>›</button>';
  el.innerHTML = html;
}

function showInitial() {
  document.getElementById('resultsMeta').style.display = 'none';
  document.getElementById('cardList').innerHTML = '';
  document.getElementById('pagination').innerHTML = '';

  const totalItems = KCA_DATA.length;
  const totalMeetings = new Set(KCA_DATA.map(function(d) { return d.title; })).size;
  const yearSpan = years[0] + '~' + years[years.length-1];
  const quickKeywords = ['재생','항균','줄기세포','탈모','독소','면역','피부과 전문의','주름','항바이러스','상처','염증','의약품','암','성분 함유','기능성'];

  document.getElementById('initialState').style.display = 'block';
  document.getElementById('initialState').innerHTML =
    '<div class="stat-cards">' +
      '<div class="stat-card"><div class="num">' + totalItems.toLocaleString() + '</div><div class="lbl">수록 지적 표현</div></div>' +
      '<div class="stat-card"><div class="num">' + totalMeetings + '</div><div class="lbl">수록 회의 건수</div></div>' +
      '<div class="stat-card"><div class="num">' + years.length + '</div><div class="lbl">수록 연도 (' + yearSpan + ')</div></div>' +
    '</div>' +
    '<div class="quick-title">자주 검색하는 키워드</div>' +
    '<div class="quick-tags">' +
      quickKeywords.map(function(k) {
        return '<span class="quick-tag" onclick="document.getElementById(\'searchInput\').value=\'' + k + '\';doSearch()">' + k + '</span>';
      }).join('') +
    '</div>';
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

showInitial();

</script>
