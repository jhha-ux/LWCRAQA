.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "다이어트로 작아진 가슴/ 짝가슴, 작은 가슴으로 인한 자존감이 상실하신 분/ 지금 바로 ○○○ 하세요!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "는 프랑스 피부과 전문의가 처방하는 대표적인 더마 코스메틱", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "케라틴 세포 분화 촉진에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "풍부한 미네랄 성분으로 … 세포 산성화, 노화방지", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "접시꽃은 꽃, 잎, 뿌리를 모두 약으로 사용하는데 중국 의서에 의하면 촉규근은 열을 내리고 염증을 제거하고, 부스럼을 치료하는데 사용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 7, "seqLabel": "제7차", "title": "2014년 제7차 광고자문위원회 관련", "date": "2014-04-15", "total": "67", "unfit": "8", "cond": "44", "expr": "동의보감에 의하면 알로에는 어린이의 열성경련을 다스리는데 도움을 준다고 함", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10747"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "위치하젤은 아메리카 인디언들 사이에서 예로부터 전해 내려오던 상비약이기도 하였으며, 현재까지도 … 상처소독, 치유, 재생목적으로 많이 사용 … 위치하젤이 포함된 화장품을 이용 시 피부의 탄력 재생과 면역력이 증진 된다고 널리 알려져 있어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "세계 최고의 오일", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "카렌둘라꽃추출물: … 피부에 치유력을 부여하고, …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "서던우드추출물: 지방세포의 분화를 촉진시켜 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "이 적용된 부위는 … 열발생을 가속화하며, 이로 인해 발생하는 적용부위의 땀 배출은 원활하게 합니다, … 혈액순환이 향상되고 이 결과 필요한 산소와 영양분이 잘 전달됩니다. 결과적으로 이는 근육의 회복을 빠르게 하고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "… 점 뺀 곳 등의 열린 상처를 효과적으로 케어 하고자 할 때, … 점 뺀 곳 등의 상처 회복을 도와줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "주요 원료인 이모르뗄은 아로마테라피용으로 사용되는 꽃으로 항알레르기성, 항염증성, 항바이러스제로써 새로운 피부조직을 생성시키며, 노화방지 등의 탁월한 효과를 가지고 있는 현재 가장 주목 받고 있는 원료", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "면역과민 반응성 피부, 가려운 피부엔 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "… 항알러지 식물유래 특허 유산균 추출물이 피부유해균을 억제하고 수퍼항원을 차단합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 8, "seqLabel": "제8차", "title": "2014년 제8차 광고자문위원회 관련", "date": "2014-04-29", "total": "77", "unfit": "32", "cond": "22", "expr": "자외선 방어 기능, 자외선 차단효과, 유•무기 자외선 차단 성분이 최적의 자외선 차단막을 형성", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10748"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "\"오랜 진료를 하고 나면 지치고 스트레스를 받아 피부도 거칠어져요. 에센스 로션은 바르자마자 … \" OOO (피부과 의사)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "두명의 안과 의사들이 사용하는 OOO 아이크림, \"OOO 아이케어가 어려보이는 피부의 비밀이죠 … \" (OOO 안과 전문의)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "피부과 전문의가 확인한 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "… 세포 활동을 촉진시켜 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "OOO은 프랑스 최고의 코스메틱 업체", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "특허 명: 유해병원성 미생물 생육 억제능 및 항알레르기성을 갖는 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "28명의 아토피 피부염 환자가 연구를 마쳤으며 4주간 시행한 유산균 함유 보습제 연구 결과 … 이는 손상된 아토피 피부염 부위에서 손상된 피부의 회복에 OOO가 기여한 결과 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 9, "seqLabel": "제9차", "title": "2014년 제9차 광고자문위원회 관련", "date": "2014-05-19", "total": "55", "unfit": "16", "cond": "20", "expr": "에델바이스의 미백 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10751"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "피부 합병증 때문에 고통 받던 당뇨성 족부궤양 치료를 받던 환자들의 간절한 요청에서 부터 시작되었습니다. 손상된 피부의 빠른 회복이 되어야만 치료가 될 수 있는 환자들을 위해 OOO 상피세포성장인자(Epidermal Growth Factor, EGF) 치료제를 개발하게 되었고 이는 많은 환자들을 치유하는데에 성공하였습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "동의보감, 향약집성방, 본초도감 등 의서에 많이 처방된 … 장미가 없었더라면 의학이 이처럼 발전하지는 못했을 것이라는 말이 있을 정도로 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "바이오다이나믹 플랭크톤: … 높은 수준의 에너지를 피부 세포에 전달, 신진대사 촉진", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "목련꽃복합체: 피부 가려움을 예방하며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "라즈베리줄기세포: 손상된 DNA를 복구하고 강력한 항산화 작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "카올린: … 치유기능이 있는 점토", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "쟈스민: 세포 순환 촉진 작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "황색해조류: 유해 산소에 의한 멜라닌의 산화를 막아주며 세포재생 촉진", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "대두: 피부조직을 재건하는 작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "OOO 한방힐링복합체: 고대 중국 의학기술과 접목시킨 OOO만의 세가지 힐링 식물 복합체 탈수, 산화 스트레스, 세포 저하로부터 피부를 적극적으로 보호하여 노화속도를 단축시켜 줌", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "운동 중 발생하는 ‘열’의 체외손실을 최소화 시켜 주어 웜업 효과를 빠르게 합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "OOO은 의약품인가요? 미국 내에서는 OTC 제품으로 분류되어 의약품에 가까운 제품입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "아킬레스가 트로이전쟁 때 부상당한 병사들에게 이 풀을 나눠 준데서 붙여졌다고 합니다. 연장을 자주 쓰는 목수들이 상처에 자주 썼다고 해서 OOO이라고 불리는 야생식물입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "국부에 가려움증, 냄새제거, 약산성유지, 국부 주변에 발진 및 가려움 …, 에스트로겐의 감소로 인한 국부 건강 관리", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "몸에 유익균을 활성시키고 보호하려면 약산성(PH 4~6)을 유지하여야만 되므로 여성청결제를 사용하셔야만 됩니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "에델바이스추출물: 식물성 UVA, UVB 차단기능 … , 천연 썬스크린 효과로 SPF 6~8 정도의 피부 보호 효과를 작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 10, "seqLabel": "제10차", "title": "2014년 제10차 광고자문위원회 관련", "date": "2014-06-02", "total": "85", "unfit": "38", "cond": "25", "expr": "물냉이추출물: 멜라닌 생성을 억제하여 목 피부를 환하게 하고 잡티생성을 최소화시켜 줌", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10752"}, {"year": "2014", "seq": 11, "seqLabel": "제11차", "title": "2014년 제11차 광고자문위원회 관련", "date": "2014-06-18", "total": "50", "unfit": "20", "cond": "15", "expr": "가려움 : 사용 2주 뒤 피부 가려움 39% 감소", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10753"}, {"year": "2014", "seq": 11, "seqLabel": "제11차", "title": "2014년 제11차 광고자문위원회 관련", "date": "2014-06-18", "total": "50", "unfit": "20", "cond": "15", "expr": "거뭇거뭇한 기미를 확!, 지긋지긋한 기미, 지우고 싶다면?, 기미, 싹 닦아 낼 수 없을까?", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10753"}, {"year": "2014", "seq": 11, "seqLabel": "제11차", "title": "2014년 제11차 광고자문위원회 관련", "date": "2014-06-18", "total": "50", "unfit": "20", "cond": "15", "expr": "지우고 싶은 기미엔 ○○○, 박박 문지르고 싶은 기미엔 ○○○, 기미 걱정까지 말끔하게 지워내세요", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10753"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "피부 합병증 때문에 고통 받는 당뇨성 족부 궤양 치료 환자들의 간절한 요청으로, 상피세포성장인자 치료제를 개발하게 되었습니다. 손상된 피부의 빠른 회복이 되어야만 치료가 되는 환자들에게 ◯◯◯에서 개발한 EGF 치료제, 이지에프외용액은 많은 환자들을 치유하는 데에 성공하였습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "아킬레스가 트로이전쟁 때 부상당한 병사들에게 이 풀을 나눠 준 데서 붙여졌다고 합니다. 날카로운 연장으로 상처가 많은 목수들이 아끼고 가까이에 두었다고 하여 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "피부 볼륨감 충전 효과, 필러 후 탈력과 볼륨을 보다 더 오래오래-, 피부에 … 볼륨을 더하다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "… 바르는 보톡스라고도 불리운다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "특허물질 ◯◯◯이 면역력이 약해진 피부 보호에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "D라인 살트임 예방을 위한 7가지 팁", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "… 독성의 제거 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "고대에서부터 블랙커런트를 … 약용으로도 사용해왔습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "스테로이드 무검출 안정성 인증, 스테로이드 검사 완료", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "라벤더: 강력한 살균작용이 있어 상처 치료에도 좋다. 흉부의 감염증, 가래, 감기에도 … 진정작용이 있어 불안이나 긴장 완화 … 신경성 두통에 효과가 있으며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10755"}, {"year": "2014", "seq": 12, "seqLabel": "제12차", "title": "2014년 제12차 광고자문위원회 관련", "date": "2014-06-30", "total": "134", "unfit": "25", "cond": "43", "expr": "페퍼민트: … 고대 로마 병사들도 원정  제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "본초강목- 기를 내리고, 자궁을 따뜻하게 해주며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "배양추출물이란? - ○○○는 분열이 왕성하기 때문에 일반 식물체보다 항염, 항산화, 항주름, 미백등에 효과적입니다. 잡티생성을 억제하고 피부 노화 예방에 뛰어난 효과와 월등한 항산화 효과와 높은 콜라겐 합성효과를 냅니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "호주 원주민들은 오랜기간 근육통 및 관절염, 화상, 상처 등에 에뮤오일을 사용 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "미백성분인 알부틴 … 배합되어 …,", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "알파비사보롤 … 등 미백 … 에 효과적인 성분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 13, "seqLabel": "제13차", "title": "2014년 제13차 광고자문위원회 관련", "date": "2014-07-21", "total": "76", "unfit": "18", "cond": "43", "expr": "주름과 … 에 뛰어난 휴먼올리고펩타이드-1 성분이 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10756"}, {"year": "2014", "seq": 14, "seqLabel": "제14차", "title": "2014년 제14차 광고자문위원회 관련", "date": "2014-07-29", "total": "71", "unfit": "16", "cond": "33", "expr": "기미지우개의 놀라운 효과!, 모든 기미 expr": "세계 최초 자가 줄기세포 치료제 연구개발기업 ○○○, 세계 최초 성체줄기세포치료제 개발기술 보유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10765"}, {"year": "2014", "seq": 18, "seqLabel": "제18차", "title": "2014년 제18차 광고자문위원회 관련", "date": "2014-09-25", "total": "37", "unfit": "14", "cond": "14", "expr": "석류꽃 : … 안면 홍조 개선 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10765"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "셀룰라이트 제거, V-라인", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "약물전달 지속력: 3시간(기존 기술은 30~40분 유지) …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "의약연구 경험기반과 피부연구 기술로 최적의 뷰티케어 솔루션을 제공하는 병의원전용브랜드 ○○○, … 병의원 전용 홈케어 라인", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "혈액응고 촉진 도움 : ○○○, 혈관벽 결합조직을 강화 : ○○○, 손상된 혈관 및 조직 강화 : ○○○", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "스테로이드 등의 유해물질 불검출 테스트 완료", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "뭉친 근육 관절 다푸러, … 근육, 관절 등의 불편한 부위에 ○○○을 발라주세요,  … 전신 근육, 관절부위의 피부에 바르시면 좋습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "이런 분이 사용하시면 좋아요 … 가려움을 동반한 지루성 염증이 있는 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "다양한 활용성: … 화상, 벌레물린데 등", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "줄기세포 치료제 연구개발기업, 줄기세포치료제를 허가받은 기업입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 19, "seqLabel": "제19차", "title": "2014년 제19차 광고자문위원회 관련", "date": "2014-10-15", "total": "55", "unfit": "30", "cond": "20", "expr": "피부 재생의 도움을 주는 성장인자로 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10767"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "피부과 시술 전문제품, 레이저 시술효과를 높여주는 병·의원 전문제품", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "회복력을 높이고 피부 내부 항상성을 높일 수 있는 전문 제품을 사용해야 합니다, … 피부 회복력을 갖는 전문 제품을 골라야 합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "집중 회복 세럼, … 빠른 회복을 위해", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "는 세계적인 줄기세포 연구 및 치료제 전문기업", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "찜질 효과/경기력 향상, … 하루 종일 집안일로 팔다리가 쑤셔서 잠을 설치신다고요?", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "근육을 부드럽게 풀어줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 20, "seqLabel": "제20차", "title": "2014년 제20차 광고자문위원회 관련", "date": "2014-10-28", "total": "26", "unfit": "7", "cond": "11", "expr": "이제 파스 바르지 마세요. ○○○ 크림이 후끈하게 해결해드립니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10768"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "볼륨 효과, 볼륨 케어, 볼륨감이 차오른다, 볼륨 있는 피부로 만들어줘요, 볼륨감 넘치는 피부", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "웃기만 했는데 다들 수술했냐고 물어봐 … 볼륨감 있고 생기있어 보이는 인상의 비밀 … 볼륨감이 생기는 듯한 느낌이 들어요.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "티벳의 의학서에서도 언급되어 있는 성분 ○○○", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "화장품 관련 특허: … 항알러지 및 항염증 활성을 갖는 ○○○을 함유하는 화장료 조성물", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "성분의 항염 작용으로 상처난 피부가 덧나는 것을 방지하며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "은 낮으로부터의 피로를 회복하고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "의학적으로 ○○○은 귀한 약재로 쓰여 왔으며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "… 홍조 때문에 고민이에요 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "얼굴 라인을 잡아 줍니다, 흐트러진 페이스 라인을 정리하고 싶을 때 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "v얼굴 라인을 잡아 줍니다, v존 페이스 라인 맞춤, v라인", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "트러블 개선뿐 아니라 트러블로 인해 생긴 빨간 자국도 엷어지고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "피부 얼룩 고민을 위해 …, 얼룩을 정리해줍니다, 피부 얼룩에 사용, 피부 얼룩 감소", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "97% 피부가 즉각적으로 차오르는 것을 느꼈다고 응답, 93% 얼굴 볼륨이 다시 살아난 것을 느꼈다고 응답", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "한 달 동안 사용한 결과, 10명 중 8명 이상의 여성이 얼굴 윤곽과 볼륨이 조화롭게 되살아나는 것 같은 느낌을 받았다고 응답", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "… 혈액 순환에 도움을 주어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "피부톤을 밝혀주고 기미 등으로 인한 색소침착 등을 투명하고 화사하게 개선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 21, "seqLabel": "제21차", "title": "2014년 제21차 광고자문위원회 관련", "date": "2014-12-03", "total": "173", "unfit": "58", "cond": "108", "expr": "기미와 같은 색소침착이 완화되는 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10769"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "… 이런 분께 추천드립니다: 색소침착이 심해서 시술을 받을까 고민하시는 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "최상의 시술 효과를 이끌어내고 싶을 때 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "탄력업이 처진 엉덩이에 힙라인 완성, 이쁜 다리라인 완성, 늘어진 허리와 엉덩이에 탄력공급을 통한 S라인 완성, 늘어진 팔뜩살에서 가슴라인까지 바디라인 완성", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "피부볼륨이 탱글탱글 살아나는 … , 볼륨감 넘치는 피부로 변한 것 같아요 … , 피부에 볼륨을 주기 원할 때 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "토코페릴 아세테이트: 재생 작용을 하며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "항염 효과를 주는 Phytosphingosine을 함유", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "피부 상처의 빠른 회복을 도와 최상의 결과를 이끌어내기 위한 필수 제품", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "빠른 회복이 필요한 부위에 국소적으로 사용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "상처 부위가 회복되는 동안 습윤 상태를 유지 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 22, "seqLabel": "제22차", "title": "2014년 제22차 광고자문위원회 관련", "date": "2014-12-08", "total": "90", "unfit": "25", "cond": "59", "expr": "시술을 하고 난 직후에는 피부에 일시적으로 상처가 생기기 때문에 피부자극을 최소화 하고 회복력을 높이고 피부 내부 항상성을 높일 수 있는 제품을 발라야 합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10771"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "볼이 꺼져 보이던 부분까지 얼굴선을 따라 글래머러스한 굴곡이 되살아납니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "이마 : 동그란 광채를 따라 볼록하게 솟은 느낌, 수분필러를 맞은 듯 볼록하게 솟은 느낌", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "꺼졌던 눈 밑 애교살이 채워진 느낌, T존의 볼륨감, 광대의 자연스러운 볼륨감", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "재생기능이 뛰어난 럭셔리 골드 홈케어 키트 … 재생에 좋은 제품입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "얼굴에 비타민 주사를 맞은 듯한 효과를 느낄 수 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "홍조가 있는 분들에겐 피부톤 개선에 도움을 주고 … , 얼굴의 붉은 홍조의 열을 내려주고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "셀엑스 콤플렉스가 세포 활성에 도움을 주어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 23, "seqLabel": "제23차", "title": "2014년 제23차 광고자문위원회 관련", "date": "2014-12-15", "total": "60", "unfit": "8", "cond": "42", "expr": "피부 재생 촉진 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10772"}, {"year": "2014", "seq": 24, "seqLabel": "제24차", "title": "2014년 제24차 광고자문위원회 관련", "date": "2014-12-29", "total": "68", "unfit": "8", "cond": "52", "expr": "사단법인 대한아토피협회 아토피 안심마크 획득, 대한아토피협회 아토피 안심마크 획득으로 아토피 피부도 안심하고 사용하실 수 있습니다, 대한아토피협회 추천 제품입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10773"}, {"year": "2014", "seq": 24, "seqLabel": "제24차", "title": "2014년 제24차 광고자문위원회 관련", "date": "2014-12-29", "total": "68", "unfit": "8", "cond": "52", "expr": "이런 분은 꼭 바꿔보세요! … 머리가 빠져서 빗질하기 겁난다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10773"}, {"year": "2014", "seq": 24, "seqLabel": "제24차", "title": "2014년 제24차 광고자문위원회 관련", "date": "2014-12-29", "total": "68", "unfit": "8", "cond": "52", "expr": "주름진 피부에 풍성한 볼륨력 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10773"}, {"year": "2014", "seq": 24, "seqLabel": "제24차", "title": "2014년 제24차 광고자문위원회 관련", "date": "2014-12-29", "total": "68", "unfit": "8", "cond": "52", "expr": "백발 개선 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10773"}, {"year": "2014", "seq": 24, "seqLabel": "제24차", "title": "2014년 제24차 광고자문위원회 관련", "date": "2014-12-29", "total": "68", "unfit": "8", "cond": "52", "expr": "일랑일랑 : 탈모방지작용 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10773"}, {"year": "2015", "seq": 1, "seqLabel": "제1차", "title": "2015년 제1차 광고자문위원회 관련", "date": "2015-01-14", "total": "94", "unfit": "25", "cond": "64", "expr": "펩타이드 성분 함유로 피부에 볼륨을 … 충전하여 …", "link": "https://kcia.or.kr/ad/cs/notic nk": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10777"}, {"year": "2015", "seq": 2, "seqLabel": "제2차", "title": "2015년 제2차 광고자문위원회 관련", "date": "2015-01-28", "total": "55", "unfit": "21", "cond": "33", "expr": "주름으로 인한 노화의 징후를 예방", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10777"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "유산균생성, 산성화, 젖산 생성 효과 인증", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "은 에스테틱분야 전문의사 100인의 자문을 받아 개발된 병의원 전용 프리미엄 기능성 화장품입니다, 전문의사 100인의 자문으로 만들어진 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "은 프랑스의 세더마사의 개발 성분으로 지방 세포를 자극시키고 생성을 촉진시켜 볼륨을 증가 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "보톡스 유사 효능을 갖는 ○○○은 … 표정 주름을 만드는 근육을 이완시켜 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "시술 후 환자의 만족도를 높일 방법을 연구한 끝에 의약외품에 가까울 정도로 엄선된 원료를 선별하여 프리미엄 화장품을 병의원 전용으로 출시", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "다양한 피부 질환에 도움을 주는 고농축 제품, 다양한 피부 질환에 많은 도움을 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "여드름균 억제", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "줄기세포배양액의 탁월한 재생능력이 … 피부의 세포재생능력을 가속화 시킨다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "재생관리를 해야 하는 피부에 추천합니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "silk protein: 세균증식 억제, 세포 활성화", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "발효물은 각종 독성을 해독한다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "피부독성을 해독하는 성분이 매우 뛰어납니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "탱탱한 볼륨감이 있는 피부, 살아나는 얼굴선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 3, "seqLabel": "제3차", "title": "2015년 제3차 광고자문위원회 관련", "date": "2015-02-11", "total": "214", "unfit": "59", "cond": "86", "expr": "잔주름 개선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10778"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "지금 딱 일주일 사용하여 보았는데 아이가 가렵다고 허벅지를 벅~벅~ 소리 내어 긁는 일은 거의 보지 못하였습니다. 그리고 엉덩이의 기저* 발*도 함께 싹~사라져 버렸습니다. 너무 신기하고 이상하단 생각까지 들 정도로 좋아졌습니다 …. 아기 로션으로 조금 부담되는 가격이긴 하지만, 아*피나 건*있는 아기 엄마들은 제 심정 이해하실 겁니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "덕분에 10년 동안 고생한 질염이 싹 사라져, ○○○이 저를 구했어요.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "피부 재생 촉진 도움 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "붉은 자국, 갈색 스팟 등을 완화하니 완전 소중한 아이템이죠!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "항산화 성분이 피부 손상과 붉은 기를 줄여줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "헬스? 식단조절? 지방흡입수술? 지금까지 어렵고 힘들고 위험했던 몸매관리에 대한 고정관념을 바꿔드리겠습니다. ○○○은 간단하고, 쉽고, 빠르게 만족스러운 결과를 드립니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "색소침착 현상을 줄입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "이 새로운 농축 컨센트레이트 세럼은 주름에 더욱 효과적으로 작용 … 주름 개선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 4, "seqLabel": "제4차", "title": "2015년 제4차 광고자문위원회 관련", "date": "2015-03-04", "total": "231", "unfit": "40", "cond": "120", "expr": "화이트닝 효과 … 멜라닌 컨트롤 테크놀로지가 피부 깊숙한 곳까지 침투하여 다각적인 화이트닝 효능을 발휘 … 다크 스팟을 완화하고 칙칙한 피부톤을 개선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10779"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "해독작용, 피부 세포 증식 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "강남 성형외과 피부과 연어주사 열광하다, 지금 강남에서 엄청난 인기를 끌고 있는 연어주사의 주성분을 그대로, 이젠 바르자, 싼 가격에~", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "은 … 피부가 상처나가나 혹은 수술이나 레이저시술 후 빠른 재생을 할 수 있도록 돕기도 한다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "호주 다이어트 크림 판매1위의 명성", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "식물성 원료에서 추출한 ○○○은 현재까지 나온 코스메틱 중 지방세포 증식에 가장 강력한 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "이 세포 장수 단백질을 촉진하고 세포 사이의 명확한 소통을 회복", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "은 피부세포에 산소를 공급하고 … ○○○은 섬유아세포의 말단소립을 보호 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "원기 회복, 썬번과 벌레 물린 곳 … 개선 효과가 뛰어납니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "즉각적으로 피로의 흔적을 없애주고 순환저하, … 울혈 완화, 혈관수축, 정맥강화 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "목과 데콜테, 가슴 부위의 긴장근 완화 … 피부재건, 슬리밍, 치유 효과가 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 5, "seqLabel": "제5차", "title": "2015년 제5차 광고자문위원회 관련", "date": "2015-03-19", "total": "41", "unfit": "15", "cond": "17", "expr": "이 보톡스와 유사한 효과를 보여줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10780"}, {"year": "2015", "seq": 6, "seqLabel": "제6차", "title": "2015년 제6차 광고자문위원회 관련", "date": "2015-04-02", "total": "59", "unfit": "12", "cond": "34", "expr": "셀룰라이트 제거용 경피조성물", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10781"}, {"year": "2015", "seq": 6, "seqLabel": "제6차", "title": "2015년 제6차 광고자문위원회 관련", "date": "2015-04-02", "total": "59", "unfit": "12", "cond": "34", "expr": "팽팽하게 채워줄 방법은 없을까, 링클콜렉터가 주름을 찾아내 꽉꽉 채워줍니다, 이젠 맞지말고 바르자.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10781"}, {"year": "2015", "seq": 6, "seqLabel": "제6차", "title": "2015년 제6차 광고자문위원회 관련", "date": "2015-04-02", "total": "59", "unfit": "12", "cond": "34", "expr": "EGF : 피부가 상처나거나 혹은 수술이나 레이저시술 후 빠른 재생을 할 수 있도록 돕기도 한다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10781"}, {"year": "2015", "seq": 6, "seqLabel": "제6차", "title": "2015년 제6차 광고자문위원회 관련", "date": "2015-04-02", "total": "59", "unfit": "12", "cond": "34", "expr": "에 함유된 풍부한 아미노산과 … 은 피부 세포의 회복을 돕는 필수 성분으로 … 피부의 재생 능력을 촉진 시킵니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10781"}, {"year": "2015", "seq": 7, "seqLabel": "제7차", "title": "2015년 제7차 광고자문위원회 관련", "date": "2015-04-24", "total": "80", "unfit": "20", "cond": "50", "expr": "항염증 및 항트러블 적용 제품, 알러지성 및 아토피성 피부 개선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10782"}, {"year": "2015", "seq": 7, "seqLabel": "제7차", "title": "2015년 제7차 광고자문위원회 관련", "date": "2015-04-24", "total": "80", "unfit": "20", "cond": "50", "expr": "슬림한 바디관리에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10782"}, {"year": "2015", "seq": 7, "seqLabel": "제7차", "title": "2015년 제7차 광고자문위원회 관련", "date": "2015-04-24", "total": "80", "unfit": "20", "cond": "50", "expr": "지긋지긋한 살과의 전쟁, 고난을 날려버릴 전문가용 홈케어 바디제품", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10782"}, {"year": "2015", "seq": 7, "seqLabel": "제7차", "title": "2015년 제7차 광고자문위원회 관련", "date": "2015-04-24", "total": "80", "unfit": "20", "cond": "50", "expr": "지방 분해 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10782"}, {"year": ", "title": "2015년 제8차 광고자문위원회 관련", "date": "2015-05-06", "total": "59", "unfit": "13", "cond": "40", "expr": "세계 최초 손상을 리셋 & 컨트롤 ○○○ 함유… , 독자적인 케라틴 재생 테크놀로지", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10783"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "은 상처 치유에 사용되는 하이드로콜로이드 밴드를 사용 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "저녁에 바르고 아침에 확인하세요. 자기전 바르는 초간단, 스피드 슬리밍 로션 돌풍", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "허리, 허벅지, 엉덩이 등 군살 신경이 쓰이는 부분에 1회 바르는 것만으로 조여주는 효과ok", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "셀룰라이트 지방감소에 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "화끈화끈 홍조 없애고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "붙이기만 하면 유효성분이 피부 내로 녹아 들어가는 바이오패치, '용해성(Dissolving) 마이크로 구조체’로 기존 주사바늘의 통증을 없앤 무고통 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 9, "seqLabel": "제9차", "title": "2015년 제9차 광고자문위원회 관련", "date": "2015-06-03", "total": "69", "unfit": "6", "cond": "56", "expr": "아세틸 헥산 펩타이드-8은 신경세표의 스네어 복합체 중 SNAP-25 단백질을 깨뜨리지 않고 다른 스네어 복합체 단백질과 결합하여 아세틸콜린의 막을 열리지 않게 합니다. 이는 기존 보툴리늄 톡신 A(보톡스)과 비교하여 단백질을 파괴하지 않는 무독성, 무해성 물질의 안전한 물질로 근육의 움직임 혹은 수축 등의 반응을 억제시켜주는 물질입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10787"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "박테리아와 곰팡이를 효과적으로 제거", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "소염작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "피부재생, 피부재생인자", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "추출물 : … 혈을 보해주고 기혈의 순환을 도와주어 어혈을 없애주는 뛰어난 효능이 있다고 알려져 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "피부가 접히는 부분은 자주 짓무를 수 있기 때문에 매일매일 기저귀 갈 때마다 ○○크림을 발라주시면서 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 10, "seqLabel": "제10차", "title": "2015년 제10차 광고자문위원회 관련", "date": "2015-06-11", "total": "140", "unfit": "32", "cond": "92", "expr": "V라인을 만들어 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10789"}, {"year": "2015", "seq": 11, "seqLabel": "제11차", "title": "2015년 제11차 광고자문위원회 관련", "date": "2015-06-23", "total": "66", "unfit": "5", "cond": "57", "expr": "감모와 약모현상 때문에 생기는 스트레스 확 줄여 줍니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10791"}, {"year": "2015", "seq": 11, "seqLabel": "제11차", "title": "2015년 제11차 광고자문위원회 관련", "date": "2015-06-23", "total": "66", "unfit": "5", "cond": "57", "expr": "홈 박피 ○○ 세럼", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10791"}, {"year": "2015", "seq": 11, "seqLabel": "제11차", "title": "2015년 제11차 광고자문위원회 관련", "date": "2015-06-23", "total": "66", "unfit": "5", "cond": "57", "expr": "작아 보이는 눈을 크고 또렷하게 개선, 크고 또렷한 눈매로 매일 더 어려지는 얼굴 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10791"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "EGF : 화상환자의 세포재생치료에 많이 사용 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "어성초 추출물 : 염증질환 개선, 피부질환 개선 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "삼백초 추출물 : 이뇨와 해독작용이 우수, 악성여드름이나 그 외 피부질환에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "놀라운 재생력 / 4분이면 OK!", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "알란토인 함유로 … 피부 세포를 재생하는데 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "울퉁불퉁 얼룩덜룩 피부 해결사 [나만의 솔루션], 나만의 시크릿 얼룩 지우개 ○○○", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "아르테미아 살리나 추출물의 활성화 기능이 속눈썹의 성장을 촉진하고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "항염증 효능이 뛰어난 니겔라 오일이 함유되어 있어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "지울 수만 있다면, 지우고 싶은 피부팽창선", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 12, "seqLabel": "제12차", "title": "2015년 제12차 광고자문위원회 관련", "date": "2015-07-16", "total": "80", "unfit": "14", "cond": "50", "expr": "급격한 체형변화의 흔적! 이제 지울 수 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10792"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "여드름 안녕, 원인을 해결 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "항염, 항산화, 상처치유력 및 피부 보습력이 우수하여 균에 감염되기 쉽고 상처가 있으며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "오일은 오래전부터 호주, 아프리카에서는 피부발진, 화상, 피부암, 피부 개선에 효과가 있어서 사용해왔어요.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "오일은 피부염, 습진, 건선, 가려운 피부, 여드름, 가벼운 화상 및 흉터, 벌레물린 가려움, 근육 부상을 제거, 기저귀 발진 등의 피부에 문제가 있을 때 치료법으로 효과가 있으며 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "인체적용시험을 통해 셀룰라이트 감소 효과를 검증 받은 ○○바디패치는 옆구리와 엉덩이의 탄력을 높인다. 또한 다리 부종까지 효과적으로 완화한다고 하니 부위별로 관리 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 13, "seqLabel": "제13차", "title": "2015년 제13차 광고자문위원회 관련", "date": "2015-07-23", "total": "108", "unfit": "12", "cond": "73", "expr": "비타민A : 피부의 두께를 증가시키고 단백질 생성을 촉진, 비타민E : 피부염증 억제 작용, 비타민C : 노폐물 배출 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10793"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "세포의 저항성을 증가시켜 피부노화를 억제 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "추출물 : 신이 인류에게 내려준 신비한 열대식물로 항암, 항산화물질 파이토케미칼 성분이 다량 함유되어 이상세포에 영양공급을 차단하여 정상세포가 잘 성장 할 수 있게 하고 진통효과가 탁월하다", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "추출물 : 혈액순환, 신진대사초진, 림프배농, 냉증제거로 전신 디톡의 효과를 주어 부종을 없애고 리프팅 효과가 확실하다, 베타엔돌핀 등의 내인성 진통물질의 분비촉진으로 진통효과가 탁월하다", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "이온화된 미네랄은 … 피부세포의 보습, 재생 작용을 도와주는 효소활동을 더욱 배가시켜 준다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "얼룩 지우개", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "사용법 : 자극받은(원하는/케어하고 싶은)부위에 진물이 멈춘 후에 사용해주세요", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "이런 분들께 추천 합니다 : 피부에 생긴 얼룩을 자연스럽게 관리하고 싶은 분", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "피부 보호막을 형성해 가려움을 줄이고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "(일반화장품에서 기능성화장품의 효능효과를 표방)", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "고기능성", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 14, "seqLabel": "제14차", "title": "2015년 제14차 광고자문위원회 관련", "date": "2015-07-30", "total": "32", "unfit": "11", "cond": "15", "expr": "멜라닌 생성의 억제를 통한 안색 개선에 관여하여 밝고 환한 피부톤 관리에 도움", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10795"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "효모는 … 피부회복, 탈모방지 등에 효과적이라고 알려져 있습니다. … 이는 ○○효모가 노폐물과 독소 제거 효과가 있기 때문입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "히알루론산은 … 관절 같은 부분의 움직임을 부드럽게 해주고 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "유해 세균99.9%제거", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "더러움만 제거해주는 일반물티슈와 달리 세균을 99.9% 제거해주어 위생적입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "화장실변기, 쇼핑카트, 유모차 등 각종용품은 물론, 사무실, 학교, 캠핑, 여행, 외출 시에도 기저귀 갈 때나, 반려동물 뒤처리 등 주변 청소 시에도 항균력 99.9%로 언제 어디서나 간편하게 사용할 수 있습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "사과껍질에는 폴리페놀 성분이 풍부하여 호르몬을 자극하고 모낭에 영향을 주어 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "추출물 : 염증을 없애는 효과, ○○추출물 : 피부염에 효과, ○○추출물 : 각종 성인병 예병, ○○추출물 : 알레르기 진정 효과", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 15, "seqLabel": "제15차", "title": "2015년 제15차 광고자문위원회 관련", "date": "2015-08-11", "total": "66", "unfit": "15", "cond": "40", "expr": "오일은 피부염, 습진, 건선, 가려운 피부, 여드름, 가벼운 화상 및 흉터, 벌레 물린 가려움, 근육 부상을 제거, 기저귀 발진 등의 피부에 효과가 있으며 이는 ○○오일이 강력한 면역체계를 갖고 있기 때문임이 밝혀졌습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10796"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "신기한 성분 ○○○ : 중금속제거/항균살균, 평균99%이상의 중금속 제거율, 99%이상의 균 제거 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "추출물 : 화상 진정, 재생 … , ○○○ 추출물 : 항균 작용, 해독, 해열 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "혹독한 시베리아 기후에서 살아남은 식물인 ○○ 열매에서 추출한 이 강력한 복구 기능의 오일은 수 세대에 걸쳐 습진, 화상 … 같은 주요 피부 고민의 해결을 위해 사용되어 왔습니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "“내가 2살 때, 나는 시베리아의 동부 작은 마을에 살고 있었습니다. 그때, 집에서 끓이던 큰 주전자의 물이 쏟아지며 팔에 화상을 입었지요. 그때 의사는 나에게 오렌지 빛을 띄는 되직한 반죽의 약을 나에게 발라주었었는데, 후에 나는 그것이 ○○ 오일이었음을 알게 되었습니다. 저는 그 심한 상처에도 지금까지 전혀 흉터가 남지 않았다는 사실에 놀라곤 합니다. 이제 저는 ○○ 오일의 열렬한 팬이 되었습니다.”", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "뛰어난 리페어 기능을 가진 8가지 분자들을 추출 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "강력한 살균•향균 및 항박테리아 특성을 가지고 있으며, 북아메리카 가정용 비상약품박스에 보관하여 사용될 정도로 천연아이템입니다.", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "벌레 물린 데 사용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 16, "seqLabel": "제16차", "title": "2015년 제16차 광고자문위원회 관련", "date": "2015-09-03", "total": "64", "unfit": "30", "cond": "29", "expr": "세균으로부터 보호해주는 똑똑한 물티슈", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10797"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "추천해 드려요 ~ 머리가 이미 많이 빠지신 분 …, 이제 막 빠지기 시작하시는 분 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10798"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "화합물을 유효성분으로 포함하는 탈모 방지 및 발모 촉진용 조성물", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10798"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "한방추출물의 놀라운 해독작용", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10798"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "보톡스와 필러의 유사효과, 보톡스 유사성분 ○○○, 보톡스와 효능이 비슷한 저분자 펩타이드와 EGF …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10798"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "손상된 피부주름을 재생시키고 피부염증을 완화 …", "link": "https://kcia.or.kr/ad/cs/notice.php?type=view&no=10798"}, {"year": "2015", "seq": 17, "seqLabel": "제17차", "title": "2015년 제17차 광고자문위원회 관련", "date": "2015-09-21", "total": "43", "unfit": "18", "cond": "19", "expr": "재생크림을
