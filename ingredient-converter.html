<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전성분 변환기 | LWC RA/QA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #171b26; --surface2: #1e2334;
    --border: #2a3050; --accent: #4f8ef7; --accent2: #7c5cbf;
    --green: #34c98a; --yellow: #f5c842; --red: #e05c5c;
    --text: #e8eaf2; --text-muted: #7a84a0; --text-dim: #4a5270;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; min-height:100vh; }

  .topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .logo-dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .logo-text { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:0.08em; }
  .logo-sub { font-size:11px; color:var(--text-muted); letter-spacing:0.04em; }
  .back-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); padding:7px 14px; border-radius:6px; font-size:12px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
  .back-btn:hover { border-color:var(--accent); color:var(--accent); }

  .main { max-width:1100px; margin:0 auto; padding:32px 24px; }

  .page-title { font-size:20px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:10px; }
  .page-desc { font-size:13px; color:var(--text-muted); margin-bottom:28px; line-height:1.6; }

  .converter-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .panel-header { background:var(--surface2); border-bottom:1px solid var(--border); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
  .panel-title { font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .panel-title .dot { width:3px; height:14px; border-radius:2px; background:var(--accent); display:inline-block; }
  .panel-badge { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-muted); background:var(--bg); border:1px solid var(--border); padding:3px 10px; border-radius:12px; }

  .input-area { width:100%; min-height:400px; background:var(--bg); color:var(--text); border:none; padding:16px; font-family:'Noto Sans KR',sans-serif; font-size:13px; line-height:1.8; resize:vertical; outline:none; }
  .input-area::placeholder { color:var(--text-dim); }

  .output-box { min-height:400px; padding:16px; font-size:13px; line-height:1.8; word-break:break-all; color:var(--text); white-space:pre-wrap; }
  .output-box.empty { color:var(--text-dim); }
  .output-box .highlight { color:var(--accent); }

  .action-bar { display:flex; gap:10px; flex-wrap:wrap; padding:14px 18px; border-top:1px solid var(--border); background:var(--surface2); }
  .btn { padding:8px 18px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; display:flex; align-items:center; gap:6px; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { opacity:0.85; }
  .btn-secondary { background:var(--surface); border:1px solid var(--border); color:var(--text-muted); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:rgba(224,92,92,0.12); border:1px solid rgba(224,92,92,0.3); color:var(--red); }
  .btn-danger:hover { background:rgba(224,92,92,0.2); }
  .btn-green { background:rgba(52,201,138,0.12); border:1px solid rgba(52,201,138,0.3); color:var(--green); }
  .btn-green:hover { background:rgba(52,201,138,0.2); }

  .options-bar { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
  .option-group { display:flex; align-items:center; gap:10px; }
  .option-label { font-size:12px; color:var(--text-muted); font-weight:600; white-space:nowrap; }
  .option-btn { padding:5px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px; cursor:pointer; background:var(--surface2); color:var(--text-muted); transition:all .15s; font-family:inherit; }
  .option-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .sep { width:1px; height:28px; background:var(--border); }

  .stats-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 16px; font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
  .stat-chip strong { font-family:'DM Mono',monospace; font-size:16px; color:var(--accent); }

  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 22px; border-radius:24px; font-size:13px; opacity:0; transition:all 0.3s; z-index:999; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .guide-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .guide-title { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:.06em; text-transform:uppercase; margin-bottom:12px; }
  .guide-steps { display:flex; gap:0; }
  .guide-step { flex:1; display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 12px; position:relative; }
  .guide-step:not(:last-child)::after { content:"→"; position:absolute; right:-10px; top:16px; color:var(--text-dim); font-size:18px; }
  .step-num { width:32px; height:32px; border-radius:50%; background:rgba(79,142,247,0.15); border:1px solid rgba(79,142,247,0.3); color:var(--accent); font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
  .step-text { font-size:11px; color:var(--text-muted); line-height:1.5; }

  @media(max-width:768px) {
    .converter-grid { grid-template-columns:1fr; }
    .guide-steps { flex-direction:column; gap:12px; }
    .guide-step::after { display:none; }
    .topbar { padding:0 16px; }
    .main { padding:20px 16px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">LWC RA/QA Request Potal</div>
      <div class="logo-sub">전성분 변환기</div>
    </div>
  </div>
  <a href="./index.html" class="back-btn">← 포탈 홈</a>
</div>

<div class="main">
  <div class="page-title">🧪 전성분 변환기</div>
  <div class="page-desc">제조사에서 받은 세로형 성분표를 가로형(콤마 구분)으로 즉시 변환합니다. 국문/영문 동시 지원.</div>

  <!-- 사용 가이드 -->
  <div class="guide-box">
    <div class="guide-title">사용 방법</div>
    <div class="guide-steps">
      <div class="guide-step"><div class="step-num">1</div><div class="step-text">왼쪽 입력창에<br>세로형 성분 붙여넣기</div></div>
      <div class="guide-step"><div class="step-num">2</div><div class="step-text">국문 / 영문<br>옵션 선택</div></div>
      <div class="guide-step"><div class="step-num">3</div><div class="step-text">오른쪽에서<br>결과 자동 확인</div></div>
      <div class="guide-step"><div class="step-num">4</div><div class="step-text">복사 후<br>패키지 문안에 사용</div></div>
    </div>
  </div>

  <!-- 옵션 바 -->
  <div class="options-bar">
    <span class="option-label">구분자</span>
    <div class="option-group" id="sepGroup">
      <button class="option-btn active" data-sep=", " onclick="setSep(this)">콤마+공백 (,&nbsp;)</button>
      <button class="option-btn" data-sep="," onclick="setSep(this)">콤마만 (,)</button>
      <button class="option-btn" data-sep=" / " onclick="setSep(this)">슬래시 (/)</button>
    </div>
    <div class="sep"></div>
    <span class="option-label">빈 줄</span>
    <div class="option-group" id="emptyGroup">
      <button class="option-btn active" data-empty="skip" onclick="setEmpty(this)">건너뜀</button>
      <button class="option-btn" data-empty="keep" onclick="setEmpty(this)">유지</button>
    </div>
    <div class="sep"></div>
    <span class="option-label">끝 구분자</span>
    <div class="option-group" id="trailGroup">
      <button class="option-btn active" data-trail="no" onclick="setTrail(this)">없음</button>
      <button class="option-btn" data-trail="yes" onclick="setTrail(this)">포함</button>
    </div>
  </div>

  <!-- 통계 -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-chip">성분 수 <strong id="statCount">0</strong></div>
    <div class="stat-chip">글자 수 <strong id="statChars">0</strong></div>
    <div class="stat-chip">빈 줄 제거 <strong id="statSkipped">0</strong></div>
  </div>

  <!-- 변환 영역 -->
  <div class="converter-grid">
    <!-- 입력 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><span class="dot"></span>세로형 입력</div>
        <span class="panel-badge" id="inputCount">0줄</span>
      </div>
      <textarea class="input-area" id="inputArea"
        placeholder="여기에 세로형 성분표를 붙여넣으세요.&#10;&#10;예시)&#10;Water&#10;Glycerin&#10;Niacinamide&#10;Panthenol&#10;..."></textarea>
      <div class="action-bar">
        <button class="btn btn-danger" onclick="clearInput()">🗑 초기화</button>
        <button class="btn btn-secondary" onclick="pasteFromClipboard()">📋 붙여넣기</button>
      </div>
    </div>

    <!-- 출력 -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title"><span class="dot" style="background:var(--green)"></span>가로형 결과</div>
        <span class="panel-badge" id="outputCount">0자</span>
      </div>
      <div class="output-box empty" id="outputArea">변환 결과가 여기에 표시됩니다.</div>
      <div class="action-bar">
        <button class="btn btn-green" onclick="copyOutput()">📋 결과 복사</button>
        <button class="btn btn-secondary" onclick="copyOutputClean()">📋 공백 정리 후 복사</button>
      </div>
    </div>
  </div>
</div>

<script>
let sepChar = ', ';
let skipEmpty = true;
let trailSep = false;

function setSep(btn) {
  document.querySelectorAll('#sepGroup .option-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  sepChar = btn.dataset.sep;
  convert();
}
function setEmpty(btn) {
  document.querySelectorAll('#emptyGroup .option-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  skipEmpty = btn.dataset.empty === 'skip';
  convert();
}
function setTrail(btn) {
  document.querySelectorAll('#trailGroup .option-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  trailSep = btn.dataset.trail === 'yes';
  convert();
}

function convert() {
  const raw = document.getElementById('inputArea').value;
  const lines = raw.split('\n');
  document.getElementById('inputCount').textContent = lines.length + '줄';

  let items = [];
  let skipped = 0;
  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) { skipped++; if (!skipEmpty) items.push(''); return; }
    items.push(trimmed);
  });

  const outEl = document.getElementById('outputArea');
  const statsRow = document.getElementById('statsRow');

  if (items.length === 0 || (items.length === 1 && items[0] === '')) {
    outEl.textContent = '변환 결과가 여기에 표시됩니다.';
    outEl.className = 'output-box empty';
    document.getElementById('outputCount').textContent = '0자';
    statsRow.style.display = 'none';
    return;
  }

  const result = trailSep ? items.join(sepChar) + sepChar : items.join(sepChar);

  outEl.textContent = result;
  outEl.className = 'output-box';
  document.getElementById('outputCount').textContent = result.length + '자';

  // 통계
  statsRow.style.display = 'flex';
  document.getElementById('statCount').textContent = items.filter(i=>i).length;
  document.getElementById('statChars').textContent = result.length;
  document.getElementById('statSkipped').textContent = skipped;
}

function clearInput() {
  document.getElementById('inputArea').value = '';
  convert();
}

async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('inputArea').value = text;
    convert();
    showToast('📋 붙여넣기 완료');
  } catch(e) {
    showToast('⚠️ 직접 Ctrl+V로 붙여넣어 주세요');
  }
}

async function copyOutput() {
  const text = document.getElementById('outputArea').textContent;
  if (!text || text === '변환 결과가 여기에 표시됩니다.') {
    showToast('⚠️ 변환할 내용이 없습니다');
    return;
  }
  try {
    await navigator.clipboard.writeText(text);
    showToast('✅ 복사 완료!');
  } catch(e) {
    showToast('❌ 복사 실패. 직접 선택해서 복사해주세요.');
  }
}

async function copyOutputClean() {
  const text = document.getElementById('outputArea').textContent;
  if (!text || text === '변환 결과가 여기에 표시됩니다.') {
    showToast('⚠️ 변환할 내용이 없습니다');
    return;
  }
  // 연속 공백, 앞뒤 공백 정리
  const clean = text.replace(/\s+/g, ' ').trim();
  try {
    await navigator.clipboard.writeText(clean);
    showToast('✅ 공백 정리 후 복사 완료!');
  } catch(e) {
    showToast('❌ 복사 실패');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// 실시간 변환
document.getElementById('inputArea').addEventListener('input', convert);

// 초기화
convert();
</script>
</body>
</html>
